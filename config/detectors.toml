# config/detectors.toml
#
# Threshold configuration for all anomaly detectors.
#
# Format:
#   Every threshold is a TOML table with three required keys:
#     value     — the numeric threshold value
#     rationale — human-readable justification, citing primary source
#     refs      — list of REFERENCES.md entry IDs (format: "D<NN>/<slug>")
#
# Rule: no threshold ships without a non-empty rationale and at least one ref.
# Missing keys cause a hard error at startup (via serde Deserialize).
#
# ADR reference: ADR 0001 §D5 (MVP detector set), CLAUDE.md §Detector Rules.
# ADR 0002: Postgres-only storage. No ClickHouse references here.
#
# ---------------------------------------------------------------------------
# D01 — Honeypot (simulation)
# ---------------------------------------------------------------------------
# Primary source: Torres, Steichen & State (2019) — HoneyBadger
#   https://arxiv.org/abs/1902.06976
# Supporting: GoPlus and Honeypot.is fork-state simulation methodology
#   (research/01-market-scan.md)
# Solana-specific: simulateTransaction RPC against Token-2022 transfer hooks
#   (research/02-detection-methodology.md §2)
#
# This is the only fully-populated detector section for Phase 2 / Sprint 2.
# Other detector sections are populated as each detector ships (Sprint 3–4).
# All sections must exist (AllDetectorConfigs Deserialize requires them all);
# stubs copied from detectors.toml.example until their sprints land.
# ---------------------------------------------------------------------------

[honeypot_sim.sell_tax_threshold]
value     = 0.30
rationale = """Lowered from 0.50 (50%) to 0.30 (30%) as a compensating control for \
              DG3 simulation deferral (docs/reviews/0001-d01-honeypot-evasions.md §6 \
              priority #3). The original 50% threshold was derived from EVM data (Torres \
              2019); Solana Token-2022 fees can be set at any bps value. A 30% effective \
              sell fee means the seller recovers only 70 cents per dollar — operational \
              honeypot territory for automated trading. Must remain consistent with \
              sell_tax_threshold_bps (companion change: 5000→3000). Revert to 0.50 if \
              Sprint 3 corpus shows false-positive rate > 5% in the 30–50% range."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.simulate_paths]
value     = 3
rationale = """Three probe amounts (small, medium, large relative to pool depth) \
              catch max-sell-amount honeypots that allow small sells but block large \
              ones. GoPlus fork-state method uses multiple probe sizes. One path is \
              insufficient because max-sell restrictions are a common evasion. Three \
              is a reasonable cost/coverage trade-off for Phase 2 on-demand mode; \
              increase to 5 in Phase 3 if evasion rate warrants it."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.buy_sell_ratio_sentinel]
value     = 5.0
rationale = """Lowered from 10.0 to 5.0 as a compensating control for DG3 simulation \
              deferral (docs/reviews/0001-d01-honeypot-evasions.md §6.3 control #1). \
              Without simulation (S6), S5 is the primary behavioural signal; a 7:1 \
              buy/sell ratio is already statistically anomalous for a normally-trading \
              token (RAVE probe: 0.82 ratio; WET probe: 0.70 ratio). 10.0 was calibrated \
              for sim-backed mode where S6 catches the cases S5 misses; in static-only \
              mode 5.0 is more appropriate. Retain 10.0 when simulation is re-enabled \
              (Phase 3). See docs/designs/0004-detector-01-honeypot.md §14."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.sell_tax_threshold_bps]
value     = 3000
rationale = """Lowered from 5000 (50%) to 3000 (30%) as a threshold calibration \
              compensating for simulation deferral (docs/reviews/0001-d01-honeypot-evasions.md \
              §6 priority #3). The original 5000 bps threshold was derived from EVM data \
              (Torres 2019); Solana Token-2022 fees can be set at any bps. A 30% transfer \
              fee means the seller recovers only 70 cents per dollar — functionally a \
              honeypot for automated trading. Must remain consistent with sell_tax_threshold \
              (0.50→0.30 companion change). Revert to 5000 bps if Sprint 3 corpus shows \
              false-positive rate > 5% in the 3000–5000 bps range."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.min_buy_count_for_ratio]
value     = 5
rationale = """Minimum number of observed buy transfers required before the \
              buy_sell_ratio signal (S5) is evaluated. Tokens with fewer than 5 buys \
              have not attracted meaningful trading activity; their zero-sell count \
              is more likely an artifact of age than sell suppression. 5 is a \
              conservative floor — no academic citation exists for a Solana-specific \
              value; calibrate from labelled corpus by Sprint 3. The RAVE probe had \
              4663 buys (well above threshold); the SYNTHETIC_permanent_delegate fixture \
              had 312 buys (also above threshold)."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.sol_probe_amount_lamports]
value     = 10000000
rationale = """Probe amount for each simulateTransaction path, in lamports (0.01 SOL). \
              The three paths in simulate_paths=3 use [1x, 5x, 10x] multiples of this \
              base amount: 0.01 SOL, 0.05 SOL, 0.10 SOL. This covers the \
              small/medium/large probe spread documented in docs/designs/0004-detector-01-honeypot.md \
              §3 (Simulation Pass) to catch max-sell-amount honeypots that allow \
              small sells but block larger ones (GoPlus fork-state methodology). \
              0.01 SOL base is intentionally low to minimize capital at risk per probe. \
              Adjust upward if pool depth requires larger amounts for meaningful \
              price impact simulation."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.simulation_slippage_bps]
value     = 500
rationale = """Slippage tolerance in basis points (5%) applied when constructing the \
              simulated sell transaction for simulateTransaction. 5% is a standard \
              DEX slippage tolerance used by Jupiter aggregator as its default for \
              new/volatile tokens. Setting slippage too low causes legitimate tokens to \
              appear as simulation failures due to price impact on shallow pools (false \
              positive). Setting too high masks genuine revert-on-sell honeypots that \
              pass only at high slippage (false negative). 500 bps is calibrated as the \
              midpoint; recalibrate if fixture data shows pool-depth-dependent failures."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.simulation_enabled]
value     = true
rationale = """Feature flag: set to false to run static-only mode (S1–S5 signals, no \
              simulateTransaction RPC calls). Used in environments without a Solana \
              RPC endpoint (CI, unit tests with mocked fixtures, low-latency scan \
              pipelines where simulation latency > budget). When false, confidence is \
              attenuated by 0.80 per the formula in \
              docs/designs/0004-detector-01-honeypot.md §6 (confidence × 0.80 cap). \
              See Open Question #3 in docs/designs/0003-detector-trait.md for the \
              RPC injection pattern used when simulation_enabled = true."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.transfer_fee_authority_extra_weight]
value     = 0.10
rationale = """Resolved spec/config discrepancy: spec (docs/designs/0004-detector-01-honeypot.md \
              §6) documented w_fee_auth = 0.05; config previously shipped 0.15. The \
              discrepancy was identified by the security review as a CRITICAL finding \
              (docs/reviews/0001-d01-honeypot-evasions.md §9.C1). Neither value was \
              pinned by a test. The 0.10 midpoint is the recommended resolution: 0.15 is \
              defensible (mutable authority is a significant future risk) but 3× the spec \
              value is indefensible without calibration. Both spec and config now document \
              0.10. A pin test in d01_honeypot.rs prevents silent future drift."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.reevaluation_interval_minutes]
value     = 15
rationale = """Compensating control for DG3 simulation deferral: any token that \
              produces a D01 event must be re-evaluated every 15 minutes for the first \
              24 hours after listing. This catches time-gated honeypots (E10 — delayed \
              freeze, docs/reviews/0001-d01-honeypot-evasions.md §E10) and oracle-gated \
              honeypots (E13 — oracle flip post-launch, §E13). The detector itself does \
              not schedule re-evaluation; this value is consumed by crates/indexer and \
              the server scheduler (see TODO in d01_honeypot.rs). 15 minutes is the \
              upper bound before a time-gated sell window (E16: buy-only window ~500 \
              slots ≈ 200 seconds) would expire without detection. See \
              docs/designs/0004-detector-01-honeypot.md §14."""
refs      = ["D01/honeypot_sim"]

[honeypot_sim.non_transferable_attenuation]
value     = 0.10
rationale = """Token-2022 NonTransferable extension (discriminator 9) makes on-chain \
              transfers structurally impossible — the token is functionally soulbound. \
              The freeze authority sub-signal (S1) fires because such tokens often retain \
              a freeze authority as an administrative key, but the risk profile is \
              categorically different from a typical honeypot: the token cannot be sold \
              at all, so the freeze-authority contribution to sell-suppression confidence \
              should be reduced, not zeroed (a zero weight would hide the audit trail). \
              Attenuated from 0.25 (normal freeze authority weight) to 0.10, reflecting \
              that freeze authority on a non-transferable token is an administrative key \
              rather than a sell-gate. The 0.10 floor is aligned with \
              transfer_fee_authority_extra_weight (also 0.10) — both represent informational \
              risk rather than active sell suppression. \
              Source: Token-2022 NonTransferable extension SPL spec; \
              docs/designs/0004-detector-01-honeypot.md §6 S1 weight table."""
refs      = ["D01/honeypot_sim"]

# ---------------------------------------------------------------------------
# D02 — Rug Pull / LP Drain
# Full implementation: Sprint 3, D02 (docs/designs/0005-detector-02-rug-pull.md)
# Primary sources:
#   Chainalysis 2025 — https://www.chainalysis.com/blog/crypto-market-manipulation-...
#   SolRPDS (Alhaidari et al. 2025) — https://arxiv.org/abs/2504.07132
#   LROO (Shoaei et al. 2026) — https://arxiv.org/html/2603.11324
#   RAVE probe — research/token-probes/rave-FeqiF7TE.md
# ---------------------------------------------------------------------------

[rug_pull_lp_drain.lp_removal_threshold]
value     = 0.65
rationale = """Chainalysis (2025): deployer removes >=65% of pool liquidity AND \
              pool value >=$1,000 AND >100 prior transactions. This is the most \
              widely cited empirical threshold from a large-scale study (2024 \
              on-chain data, 3.59% of 2,063,519 tokens). SolRPDS (2025) corroborates \
              on 62,895 Solana pools. Round-number thresholds (50%, 75%) are used by \
              individual actors to evade detection; 65% is a calibrated midpoint from \
              the 2M+ token study."""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.min_pool_usd]
value     = 1500.0
rationale = """Raised from $1,000 (Chainalysis 2025) to $1,500 to compress the \
              dead-pool straddling band identified in security review \
              docs/reviews/0002-d02-rug-pull-evasions.md §4 recommendation #3 \
              and §7 (DG-D02-4 exploitation). An attacker who leaves exactly $1,001 \
              of residual liquidity straddles both signals — neither Signal A \
              (no qualifying Burn row) nor Signal B fires correctly. Raising to \
              $1,500 requires the attacker to leave $1,501 instead of $1,001, \
              narrowing the straddling band by 50%. False positive impact: pools \
              between $1,000–$1,500 that would have fired now do not; at this size \
              harm from a drain is minimal. Classified as unverified-heuristic \
              adjustment — no academic citation for the 1500 value specifically."""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.min_prior_txs]
value     = 100
rationale = """Chainalysis (2025): pool must have had >100 prior transactions. \
              Pools with <100 txs have not attracted meaningful trading activity; \
              a drain on such a pool is indistinguishable from an abandoned liquidity \
              position being reclaimed by the LP. 100 is the Chainalysis cutoff. \
              Applies to Signal A only; Signal B still evaluates low-activity pools."""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.lp_safe_floor_pct]
value     = 70.0
rationale = """SolRPDS (Alhaidari et al. 2025) Table 3: >70% LP burned or locked is \
              the structural threshold distinguishing safe from at-risk pools in their \
              62,895-pool Solana dataset. LROO (2026) corroborates: >95% of rugged \
              tokens had <70% protected LP before the drain event. Replaces the \
              architect's split lp_burn_safe_floor (80%) + lp_lock_safe_floor (50%) \
              with a unified effective_safe_pct = burned + active_locked. The 70% \
              value is the published threshold; 80% was architecturally conservative. \
              Per CLAUDE.md §FP/FN rule: false negatives (missed latent risk) cost \
              more than false positives. Source: https://arxiv.org/abs/2504.07132"""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.minimum_lock_horizon_days]
value     = 45
rationale = """Raised from 30 days to 45 days per security review \
              docs/reviews/0002-d02-rug-pull-evasions.md §4 recommendation #2 \
              and E-D02-15 (compounded lock expiry + same-block drain). A 30-day \
              horizon gave zero advance warning when the drain was executed the \
              moment the lock crossed the horizon. A 45-day horizon means an attacker \
              must maintain the lock for 15 more days past the original floor, while \
              the companion expiry_proximity_bonus_max signal provides a 90-day \
              (2 × 45) warning runway before the lock drops out of the active window. \
              No academic citation — derived from practical trading horizon of \
              bot-trader-2-0's position duration. Classified as unverified-heuristic; \
              calibrate from labelled fixture corpus in Sprint 4. \
              See: Certik Security "Time-lock Bypass" post-mortem category (2023)."""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.single_provider_bonus]
value     = 0.15
rationale = """RAVE probe anchor calibration: the RAVE pre-drain fixture \
              (research/token-probes/rave-FeqiF7TE.md §2 D02) had \
              lp_provider_count=1; the analyst's manual confidence assessment \
              was 0.72 / High. Formula without bonus: 0.50 + 0.25 = 0.75 (capped). \
              The +0.15 bonus is the value that correctly elevates the latent \
              confidence into the High band (>0.65) for single-provider pools \
              and matches the probe's qualitative assessment. Derived from probe \
              anchor, not from academic citation. Classified as probe-derived in \
              REFERENCES.md."""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.drain_window_minutes]
value     = 60
rationale = """Window over which cumulative LP removal by a single actor is summed. \
              A 65%+ drain split across 5 transactions over 60 minutes is still a \
              rug pull. SolRPDS (2025) trickle-drain analysis confirms most actual \
              drain events complete within minutes; 60 minutes provides tolerance for \
              deliberate slow drains without generating false positives from legitimate \
              LP providers reducing over days. Unverified-heuristic for exact value; \
              calibrate from confirmed trickle-drain incidents in Sprint 4."""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.lp_providers_threshold]
value     = 1
rationale = """Only single-provider pools (count=1) receive the single_provider_bonus. \
              Two-provider pools have structural diversity: two separate actors must \
              collude or one actor controls both positions. The architect's stub value \
              of 2 would penalize legitimate two-provider pools. Changed to 1 per \
              docs/designs/0005-detector-02-rug-pull.md §5 Threshold changes: 'Two \
              provider pools are structurally diverse enough that the bonus does not \
              apply.' Source: RAVE probe §5; SolRPDS (2025)."""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.drain_window_24h_minutes]
value     = 1440
rationale = """24-hour companion window for Signal A, added to catch E-D02-7 \
              (trickle drain) identified in security review \
              docs/reviews/0002-d02-rug-pull-evasions.md §E-D02-7 and §4 \
              recommendation #1. The 60-minute window catches drains split over \
              one hour; burns spaced 90+ minutes apart accumulate to zero in any \
              60-minute window but can represent a full rug over 24–48 hours. \
              When only the 24h window fires (not the 60-minute window), Signal A \
              emits at a fixed confidence of 0.75 (slightly lower urgency than an \
              immediate drain). Evidence records detection_window_minutes=1440. \
              1440 = 24 × 60. Source: LROO (Shoaei et al. 2026) §3 confirms \
              1–3 day slow drains; SolRPDS (Alhaidari et al. 2025) trickle-drain \
              sub-category."""
refs      = ["D02/rug_pull_lp_drain"]

[rug_pull_lp_drain.expiry_proximity_bonus_max]
value     = 0.20
rationale = """Maximum confidence bonus added to Signal B when a locker is approaching \
              expiry, per security review docs/reviews/0002-d02-rug-pull-evasions.md \
              §E-D02-15 and §4 recommendation #2 (compounded lock expiry + same-block \
              drain). Without this bonus, a locker at 31 days to expiry dropped out of \
              the active window with zero advance Signal B warning, allowing a same-block \
              drain attack. The bonus scales linearly from 0.0 (at 2× minimum_lock_horizon \
              = 90 days from expiry) to 0.20 (at 1 day from expiry), added BEFORE the \
              0.75 ceiling clamp. This gives a 90-day warning runway. 0.20 is calibrated \
              such that a near-expiry locker (1 day) raises confidence by 0.20, matching \
              the subjective "high proximity risk" assessment from the security review. \
              Classified as unverified-heuristic; calibrate from labelled corpus in Sprint 4. \
              See: Certik Security "Time-lock Bypass" post-mortem category (2023)."""
refs      = ["D02/rug_pull_lp_drain"]

# ---------------------------------------------------------------------------
# D03 — Holder Concentration Shift
# Full implementation: Sprint 3, D03 (docs/designs/0006-detector-03-concentration.md)
# Primary sources:
#   Brown 2023 (Gini methodology) — https://eprint.iacr.org/2023/1493.pdf
#   Shoaei et al. 2026 (TM-RugPull) — https://arxiv.org/html/2602.21529
#   Alhaidari et al. 2025 (SolRPDS) — https://arxiv.org/abs/2504.07132
#   WET probe — research/token-probes/wet-WETZjtp.md
#
# IMPORTANT: This detector computes ALL metrics over LIQUID holders only
#            (after LEFT JOIN to holder_classifications sidecar).
#            The precomputed HolderSnapshot.gini and HolderSnapshot.top10_pct
#            fields (over ALL holders) MUST NOT be used for Signals 1, 2, or 3.
#
# Threshold changes from architect stub:
#   top10_pct_elevated (0.50) DROPPED — subsumed by absolute_top10_ceiling
#   top10_pct_high_risk (0.70) REPLACED by absolute_top10_ceiling (0.80)
#     — post-sidecar-exclusion 80% is equivalent to pre-exclusion 70%
#   deployer_balance_max_pct (0.15) DROPPED — subsumed by liquid top-10 signals
# ---------------------------------------------------------------------------

[holder_concentration.gini_delta_24h]
value     = 0.05
rationale = """Brown (2023) studied Gini coefficient changes across Ethereum holder \
              distributions as a methodology reference for rapid concentration anomaly \
              detection. A 24-hour liquid-filtered Gini INCREASE of 0.05 represents a \
              rapid concentration event inconsistent with organic holder churn. \
              The 0.05 threshold is the working default from research/02-detection-methodology.md \
              §10; calibrate from labelled SolRPDS / TM-RugPull fixture corpus in Sprint 4. \
              Applied only when liquid_count >= min_liquid_holders (50); below that threshold \
              the Gini is statistically unreliable per Brown 2023 §3 population caveat."""
refs      = ["D03/holder_concentration"]

[holder_concentration.top10_pct_delta_24h]
value     = 0.10
rationale = """A 10 percentage-point increase in LIQUID-ONLY top-10 holder share within \
              24 hours indicates rapid accumulation by large wallets (excluding vesting, \
              DEX pools, CEX hot wallets). Derived from RugCheck DANGER breakpoints \
              (>70% absolute) and TM-RugPull (2026) pre-collapse concentration variance \
              analysis. No published Solana-specific delta threshold exists; calibrate \
              from SolRPDS labelled dataset in Sprint 4. Applied only when liquid_count \
              >= min_liquid_holders."""
refs      = ["D03/holder_concentration"]

[holder_concentration.absolute_top10_ceiling]
value     = 0.80
rationale = """LIQUID-ONLY top-10 holders controlling >=80% of sellable float is a \
              structural concentration risk signal (Signal 3). Set higher than the raw \
              RugCheck DANGER threshold (0.70 over all holders) because: (1) sidecar \
              exclusion already removes vesting contracts + DEX pools + CEX wallets, so \
              a post-exclusion 80% is a stronger signal than a pre-exclusion 70%; \
              (2) TM-RugPull (2026) confirms >80% concentration as a pre-collapse feature \
              in their labelled scam dataset. WET probe (research/token-probes/wet-WETZjtp.md) \
              showed that a 70% ceiling over liquid holders would fire falsely on WET \
              before sidecar classification warmed up; 80% provides headroom. \
              This replaces the architect's top10_pct_high_risk = 0.70 threshold."""
refs      = ["D03/holder_concentration"]

[holder_concentration.delta_window_hours]
value     = 24
rationale = """Standard 24-hour delta window for holder distribution comparison, \
              matching the interval used in Brown (2023) and TM-RugPull (2026) \
              concentration variance analysis. Shorter windows produce noise from \
              single large trades; longer windows miss rapid accumulation before a \
              dump. 24 hours is the canonical interval in all academic sources for \
              this signal class."""
refs      = ["D03/holder_concentration"]

[holder_concentration.prior_snapshot_tolerance_hours]
value     = 2
rationale = """Tolerance window (±2h) when looking up the prior snapshot in \
              holder_snapshots_history. The snapshot pipeline may lag 1–2 hours \
              under high load. A ±2h tolerance is sufficient to find the closest \
              24h-ago snapshot without pulling in a snapshot >26h old that would \
              materially bias the delta. Unverified-heuristic; no academic citation. \
              Reduce to ±1h if pipeline consistently achieves <60 min lag."""
refs      = ["D03/holder_concentration"]

[holder_concentration.min_liquid_holders]
value     = 50
rationale = """Gini coefficient is statistically unreliable for small populations. \
              Brown (2023) §3 notes population sensitivity as a known limitation: \
              a single large purchase can shift Gini by 0.10+ when liquid_count < 50. \
              Below 50 liquid holders, Signal 1 (Gini delta) and Signal 2 (top-10 delta) \
              are suppressed; an Info event is emitted instead. Signal 3 (absolute \
              ceiling) still evaluates — even a small number of liquid holders can \
              exhibit dangerous concentration. 50 is a pragmatic floor; calibrate \
              from labelled corpus in Sprint 4."""
refs      = ["D03/holder_concentration"]

[holder_concentration.max_lazy_classifications]
value     = 10
rationale = """Maximum number of ctx.registry.classify_holder() RPC calls per \
              evaluate() invocation to bound latency. Top-N unclassified holders \
              (by balance_raw) are classified first — highest-impact addresses get \
              classified earliest. 10 is a conservative default for on-demand mode \
              where evaluation latency < 500ms is required. Increase to 50 for \
              batch/background mode. Unverified-heuristic; tune based on observed \
              classify_holder() latency distribution in Phase 3."""
refs      = ["D03/holder_concentration"]

# ---------------------------------------------------------------------------
# D04 — Pump & Dump (volume/price spike)
# Full implementation: Sprint 4 P4-1 (docs/designs/0007-detector-04-pump-dump.md)
# Primary sources:
#   Karbalaii (2025) — https://arxiv.org/abs/2504.15790
#   Bolz et al. (2024) — https://arxiv.org/abs/2412.18848
#   Chainalysis (2025) — https://www.chainalysis.com/blog/crypto-market-manipulation-...
#   RAVE probe — research/token-probes/rave-FeqiF7TE.md
#   WET probe  — research/token-probes/wet-WETZjtp.md
#
# Three signals:
#   Signal A — volume/price spike over rolling 7d baseline (event-based)
#   Signal B — burst concentration fallback for zero-baseline tokens (event-based)
#   Signal C — insider sell-off amplifier (state+event, suppressed for established protocols)
#
# NOTE: burst_concentration_ratio_threshold renamed to burst_concentration_threshold
# NOTE: burst_concentration_threshold value changed 0.90 → 0.70 per review 0003 §E-D04-9 (2h slow-pump coverage).
#       for consistency. Config and struct updated together (Sprint 4 P4-1).
# ---------------------------------------------------------------------------

[pump_dump.volume_multiplier]
value     = 5.0
rationale = """Karbalaii (2025): ~70% of pump events have >=5x volume vs baseline in \
              the accumulation hour. Bolz et al. (2024): z-score >=3 corresponds to \
              approximately 5x baseline for normally distributed volume. Chainalysis \
              (2025) corroborates multi-sigma volume spikes as the primary pump signal. \
              Source: https://arxiv.org/abs/2504.15790 + https://arxiv.org/abs/2412.18848"""
refs      = ["D04/pump_dump"]

[pump_dump.price_spike_pct]
value     = 0.30
rationale = """Chainalysis (2025): 30% intra-hour price increase accompanies the \
              majority of confirmed P&D events. La Morgia et al. (2021): RAVE probe \
              measured +115% in 1h — 3.8x this threshold. No Solana-DEX-native published \
              threshold; calibrated from EVM studies. Recalibrate against Solana labelled \
              fixtures in Sprint 5. Source: research/02-detection-methodology.md §3."""
refs      = ["D04/pump_dump"]

[pump_dump.min_baseline_days]
value     = 3
rationale = """When fewer than 3 days of non-zero volume exist in the 7-day window, \
              the average-as-median is not statistically meaningful (RAVE probe §4 \
              Gap 2 established this requirement). A single-day observation can dominate \
              the mean, making the multiplier check meaningless. 3 is the minimum for a \
              sample mean that meaningfully differs from a point estimate."""
refs      = ["D04/pump_dump"]

[pump_dump.burst_concentration_threshold]
value     = 0.70
rationale = """Originally 0.90 from 2 data points (RAVE=1.00, WET=0.0024). Lowered to \
              0.70 per review 0003 §E-D04-9: 2-hour slow pumps produce burst_ratio \
              0.40-0.55 and are invisible at 0.90. 0.70 extends Signal B coverage to \
              the 2h case without dropping the minimum confidence floor (still 0.50 \
              at the new threshold). Classified as unverified-heuristic; calibrate \
              FP rate against 100+100 corpus in Sprint 5."""
refs      = ["D04/pump_dump"]

[pump_dump.min_burst_volume_usd]
value     = 5000.0
rationale = """Dust filter. Below $5,000 in 1h volume, the signal-to-noise ratio is \
              dominated by thin-market tokens where a single retail trade can produce \
              a 100% concentration ratio. No academic citation. Conservative floor; \
              lower to $1,000 if Sprint 5 corpus shows meaningful pumps below $5K. \
              Classified as unverified-heuristic."""
refs      = ["D04/pump_dump"]

[pump_dump.insider_sell_pct]
value     = 0.40
rationale = """research/02-detection-methodology.md §3: insider wallets selling >=40% \
              of their accumulated position within 24h confirms the dump phase. \
              Chainalysis (2025): 94% of confirmed P&D cases involve deployer selling. \
              40% is a working default with no published Solana-specific calibration. \
              Source: https://www.chainalysis.com/blog/crypto-market-manipulation-wash-trading-pump-and-dump-2025/"""
refs      = ["D04/pump_dump"]

[pump_dump.insider_amplifier]
value     = 0.15
rationale = """Additive confidence boost when Signal C confirms insider sell-off. \
              Calibrated so that a borderline Signal A (confidence = 0.60) elevated \
              by +0.15 reaches 0.75 — a meaningful severity escalation (Medium → High). \
              Capped at 0.95 for Signal A base, 0.85 for Signal B base per §5.3. \
              No academic citation; derived from confidence-formula design \
              (docs/designs/0007-detector-04-pump-dump.md §5.3)."""
refs      = ["D04/pump_dump"]

[pump_dump.post_pump_insider_window_hours]
value     = 24
rationale = """Karbalaii (2025): ~70% of dump-phase sells complete within 1 hour of \
              the pump peak; 24h is the outer bound to capture slower distributions. \
              Chainalysis (2025) uses 24h window for insider-sell confirmation. \
              Source: https://arxiv.org/abs/2504.15790"""
refs      = ["D04/pump_dump"]

[pump_dump.market_cap_filter_usd]
value     = 60000000.0
rationale = """Bolz et al. (2024) §4.2: market-cap filter <$60M reduced noise in their \
              CEX-based pump detector (top-5 accuracy improved from ~40% to 55.81%). \
              At >$60M FDV, organic buy pressure from CEX listings, protocol announcements, \
              and large-fund allocations creates volume spikes indistinguishable from \
              coordinated pumps without order-book and off-chain data. \
              Source: https://arxiv.org/abs/2412.18848"""
refs      = ["D04/pump_dump"]

[pump_dump.top_holders_insider_floor_pct]
value     = 0.01
rationale = """Signal C Priority 2 proxy floor: holders below 1% of total supply have \
              insufficient sell volume to produce a material dump-phase signal. This floor \
              filters out retail holders who happen to be in the top-N list. Conservative \
              floor; recalibrate in Sprint 5 if fixture corpus shows material insider sells \
              from sub-1% holders. Source: docs/designs/0007 §10."""
refs      = ["D04/pump_dump"]

# ---- D04 Smart-money amplification (Sprint 23, design 0023 §4.1) ----

[pump_dump.pre_pump_window_minutes]
value     = 60
rationale = """Pre-pump buyer window in minutes (Decision 3, design 0023 §11). \
              Fantazzini & Xiao 2023 (Econometrics 11(3)): informed-early-buyer window \
              is statistically distinct from post-announcement buyers within 60 minutes. \
              This is the primary calibration anchor for the smart-money pre-pump buyer set."""
refs      = ["D04/smart_money_amplification", "fantazzini_2023"]

[pump_dump.smart_money_tier1_delta]
value     = 0.12
rationale = """Confidence delta for >= 1 Tier1 smart-money wallet in the pre-pump window. \
              unverified-heuristic; Perseus 2025 (arXiv:2503.01686): all 438 confirmed \
              masterminds buy pre-event in 100% of events. +0.12 at Signal A threshold (0.60) \
              → 0.72 (Medium→High boundary). Design derivation, design 0023 §4.1 Decision 2. \
              User-approved 2026-04-25."""
refs      = ["D04/smart_money_amplification", "perseus_2025"]

[pump_dump.smart_money_tier2_delta]
value     = 0.07
rationale = """Confidence delta for >= 2 Tier2 wallets in pre-pump window (no Tier1 found). \
              unverified-heuristic; two independent data points at the same event shifts \
              probability. +0.07 at threshold (0.60) → 0.67 (Medium, not severity escalation). \
              Design 0023 §4.1 Decision 2. User-approved 2026-04-25."""
refs      = ["D04/smart_money_amplification"]

[pump_dump.smart_money_tier2_min_count]
value     = 2
rationale = """Minimum Tier2 wallet count in pre-pump window to unlock Tier2 amplification. \
              Noise floor: a single Tier2 buyer is consistent with luck (base-rate argument \
              from design 0022 §7.1). Two independent wallets are required. \
              Design 0023 §4.1 Decision 2. User-approved 2026-04-25."""
refs      = ["D04/smart_money_amplification"]

# ---------------------------------------------------------------------------
# D05 — Wash Trading (Heuristic 1)
# Full implementation: Sprint 4 P4-2 (docs/designs/0008-detector-05-wash-trading.md)
# Primary sources:
#   Chainalysis (2025) — https://www.chainalysis.com/blog/crypto-market-manipulation-...
#   Victor & Weintraud (2021) — https://arxiv.org/abs/2102.07001
#
# Three signals:
#   Signal A — H1 round-trip pattern per (sender, pool) (suppressed on established protocols)
#   Signal B — graph cycle detection: Tarjan SCC + Johnson elementary cycles (NOT suppressed)
#              Sprint 12 T2-2: replaces old cluster reciprocal flow proxy.
#              Design: docs/designs/0017-d05-signal-b-graph-cycles.md
#   Signal C — volume inflation amplifier (severity upgrade only, not standalone)
#
# Sprint 12 T2-2 changes:
#   REMOVED: min_cluster_size, cluster_balance_tolerance_pct, min_cluster_volume_usd, top_senders_cap
#   ADDED:   signal_b_cycles sub-section (Tarjan SCC + Johnson cycle detection thresholds)
# ---------------------------------------------------------------------------

[wash_trading_h1.block_window_slots]
value     = 25
rationale = """Chainalysis (2025) Heuristic 1 canonical value. Solana recalibration: \
              25 slots ≈ 10s (400ms/slot). Legitimate MMs rarely round-trip within 10s \
              on a single pool. Tighter than EVM (25 blocks ≈ 5min) but appropriate for \
              Solana sub-second slot times. Recalibrate if confirmed Solana wash cases \
              use >25 slot windows. Field renamed from block_window for Solana clarity."""
refs      = ["D05/wash_trading_h1"]

[wash_trading_h1.volume_diff_pct]
value     = 0.01
rationale = """Chainalysis (2025): buy and sell volumes within 1% of each other \
              (accounting for swap fees and price impact) constitute a round-trip. \
              At 0.01, buy and sell volumes must be within 1% — economically equivalent \
              to self-dealing once fees are subtracted. Solana constant-product AMM fees \
              (0.25–1.0%) mean true self-trades clear under 1% diff after fee accounting. \
              Victor & Weintraud (2021) use a similar near-zero-imbalance criterion."""
refs      = ["D05/wash_trading_h1"]

[wash_trading_h1.min_repetitions]
value     = 3
rationale = """Chainalysis (2025): at least 3 qualifying round-trips required. \
              One round-trip could be an experimental trade or MEV failure. Two could be \
              a coincidence. Three establishes a deliberate pattern. Chainalysis detected \
              $704M using this threshold on 2024 DEX data."""
refs      = ["D05/wash_trading_h1"]

[wash_trading_h1.severity_amplifier_ratio]
value     = 0.30
rationale = """30% of total pool volume composed of wash trades triggers Signal C severity \
              upgrade. Below 30%, the absolute wash volume matters but the pool retains some \
              genuine price-discovery function. Above 30%, the pool's volume signal is \
              materially compromised. Victor & Weintraud (2021) found >30% wash-trading \
              prevalence on IDEX/EtherDelta as a threshold for market integrity concern."""
refs      = ["D05/wash_trading_h1"]

[wash_trading_h1.detection_window_hours]
value     = 24
rationale = """Standard 24-hour observation window, matching D04 and consistent with \
              Chainalysis (2025) annual-volume aggregation methodology. Shorter windows \
              (1h) produce high false-positive rates from transient arbitrage bursts; \
              longer windows (7d) are too slow for bot-trader-2-0 alert latency. \
              Source: Chainalysis 2025; D04 window consistency."""
refs      = ["D05/wash_trading_h1"]

[wash_trading_h1.min_pool_usd_for_h1]
value     = 10000.0
rationale = """Pools below $10,000 USD liquidity have negligible price-discovery value; \
              wash trading in a dead pool produces false positives without impacting \
              consumers. Consistent with D02 min_pool_usd=$1,500 (different guard: D02 \
              guards drain risk; here we guard signal meaningfulness at scale). \
              Source: design derivation; unverified-heuristic."""
refs      = ["D05/wash_trading_h1"]

[wash_trading_h1.min_wash_volume_usd]
value     = 500.0
rationale = """Minimum total wash volume USD for Signal A confidence formula denominator. \
              Prevents log(0) and stabilises the formula for tiny-volume round trips. \
              At $500 minimum: vol_term = ln(1) * 0.10 = 0, formula starts at baseline \
              0.60. Below $500 USD total wash volume, the economic impact is negligible \
              for all four consumers. Source: design derivation; unverified-heuristic."""
refs      = ["D05/wash_trading_h1"]

# ---------------------------------------------------------------------------
# D05 Signal B — Graph Cycle Detection (Tarjan SCC + Johnson)
# Sprint 12 T2-2 replacement for old cluster-flow-balance proxy.
# Design doc: docs/designs/0017-d05-signal-b-graph-cycles.md
# Citations: Tarjan 1972; Johnson 1975; Victor & Weintraud 2021; Chainalysis 2025.
# ---------------------------------------------------------------------------

[wash_trading_h1.signal_b_cycles.max_cycle_length]
value     = 5
rationale = """Maximum elementary cycle length (number of hops = number of wallets in ring). \
              Victor & Weintraud (2021) §4.2 report the 95th percentile of wash rings on \
              IDEX/EtherDelta has 6 participants. Setting max_cycle_length=5 catches the \
              median case (3–4 participants) and misses only extreme-length rings. Increasing \
              to 6+ raises Johnson's enumeration cost for large SCCs. See design 0017 §5.3."""
refs      = ["D05/signal_b_cycles"]

[wash_trading_h1.signal_b_cycles.max_cycle_window_minutes]
value     = 120
rationale = """Maximum time window (minutes) within which all edges in a qualifying cycle \
              must fall. Victor & Weintraud (2021) §3.1 define circular trades as occurring \
              within a single trading session; 120 minutes is a conservative interpretation \
              for Solana DEX activity. Chainalysis (2025) Heuristic 2 implies intra-day \
              clustering. User-approved 2026-04-24; see design 0017 §7."""
refs      = ["D05/signal_b_cycles"]

[wash_trading_h1.signal_b_cycles.min_cycle_volume_usd]
value     = 1000.0
rationale = """Minimum USD volume for the bottleneck edge of a qualifying cycle. \
              Victor & Weintraud (2021) §4.2 report median circular trade size of \
              $5,000–$20,000 on IDEX/EtherDelta. $1,000 is deliberately below the median \
              to catch emerging wash rings. Dust cycles (< $1,000) are coincidental token \
              recycling, not coordinated manipulation. See design 0017 §5.2 filter_2."""
refs      = ["D05/signal_b_cycles"]

[wash_trading_h1.signal_b_cycles.max_cycles_per_scc]
value     = 100
rationale = """Maximum elementary cycles to enumerate from a single SCC. Johnson's algorithm \
              worst case is exponential; this cap bounds evaluation latency. An SCC with >100 \
              elementary cycles shorter than max_cycle_length=5 is either a large clique \
              (first 100 cycles confirm the pattern) or an adversarial construction (evasion \
              E-D05-B-9; logged at WARN). Do NOT increase above 1,000 without re-evaluating \
              latency budget. See design 0017 §4.4."""
refs      = ["D05/signal_b_cycles"]

[wash_trading_h1.signal_b_cycles.min_scc_size]
value     = 3
rationale = """Minimum SCC size passed to Johnson's cycle enumerator. SCCs of size 1 contain \
              no cycles. SCCs of size 2 can only produce 2-hop cycles (A→B and B→A), already \
              covered by Signal A (H1 round-trip). The mathematical prerequisite for a \
              wash ring involving 3+ distinct wallets is SCC size >= 3. Tarjan 1972 §2; \
              Johnson 1975 §1. See design 0017 §3.4."""
refs      = ["D05/signal_b_cycles"]

[wash_trading_h1.signal_b_cycles.max_transfers_per_window]
value     = 10000
rationale = """Safety ceiling on transfer edges fetched from the transfers table per D05 \
              evaluation. At 10,000 transfers in 120 minutes the transfer rate is ~83/min — \
              an extremely active pool. The first 10,000 transfers are sufficient to identify \
              ring structure. Hitting this ceiling logs WARN. Prevents unbounded SCC \
              construction. Calibrate down to 5,000 if P95 latency > 50ms. See design 0017 §2.3."""
refs      = ["D05/signal_b_cycles"]

# ---------------------------------------------------------------------------
# D06 — Mint / Burn Anomaly
# Full implementation: Sprint 4 P4-3 (docs/designs/0009-detector-06-mint-burn.md)
# Primary sources:
#   Xia et al. (2021) — https://arxiv.org/abs/2109.00229
#   Sun et al. (2024) — https://arxiv.org/abs/2403.16082
#   RugCheck: mintAuthority / is_mintable as primary Solana signals
#
# Three signals:
#   Signal A — active mint authority (state-based; dampened on established protocols)
#   Signal B — single supply change event >= threshold (event-based; fully suppressed on established)
#   Signal C — cumulative hidden mint pattern (composite; fully suppressed on established)
#
# NOTE: supply_change_pct TOML key retained for backward compatibility;
#       Rust field renamed to supply_change_threshold_pct in MintBurnConfig struct.
# ---------------------------------------------------------------------------

[mint_burn_anomaly.supply_change_pct]
value     = 0.05
rationale = """research/02-detection-methodology.md §9: supply change >5% of \
              circulating supply in a single Transfer event (mint or burn) triggers \
              Signal B. Xia et al. (2021) identified hidden mint as the primary \
              mechanism in ~10,000 scam Uniswap tokens; Sun et al. (2024) confirms \
              it as a top rug root cause. 5% in one event is anomalous for fixed-supply \
              tokens. No published Solana-specific calibration; working default. \
              Reduce to 2% if labelled fixture data shows mints below 5% causing harm."""
refs      = ["D06/mint_burn_anomaly"]

[mint_burn_anomaly.mint_authority_grace_period_days]
value     = 7
rationale = """New projects commonly deploy with mint authority to execute genesis-phase \
              minting (airdrops, LP seeding, team allocation) and revoke within the first \
              week. Sun et al. (2024) observe that rugged tokens almost never revoke; \
              non-rugged tokens revoke within 1-7 days post-launch. A 7-day grace period \
              prevents alerting on every new token while remaining short enough to catch \
              projects that retain authority without a stated reason. Classified as \
              unverified-heuristic; calibrate from labelled corpus in Sprint 5. \
              Source: Sun et al. 2024 §4 hidden mint pattern; RugCheck mintAuthority signal."""
refs      = ["D06/mint_burn_anomaly"]

[mint_burn_anomaly.hidden_mint_cumulative_pct]
value     = 0.20
rationale = """Sun et al. (2024) hidden mint category: supply inflation post-genesis is \
              the defining characteristic of the pattern. A 20% cumulative non-LP mint \
              over 30 days provides 4x headroom above the per-event 5% threshold (to \
              catch trickle-mint evasion E2) while remaining high enough to distinguish \
              from legitimate treasury operations. Classified as unverified-heuristic; \
              calibrate from labelled corpus in Sprint 5. \
              Source: Sun et al. 2024 §4; no published numeric threshold for cumulative variant."""
refs      = ["D06/mint_burn_anomaly"]

[mint_burn_anomaly.hidden_mint_window_days]
value     = 30
rationale = """30-day rolling window for Signal C cumulative supply change calculation. \
              Consistent with D04/D05 detection windows; long enough to aggregate \
              trickle-mint attacks while short enough to remain actionable. A 30-day \
              window is standard in academic sources for supply anomaly detection. \
              Classified as unverified-heuristic. \
              Source: research/02-detection-methodology.md §Cross-cutting C."""
refs      = ["D06/mint_burn_anomaly"]

[mint_burn_anomaly.min_token_age_days_for_hidden_mint]
value     = 14
rationale = """14 days gives genesis-phase minting activity time to settle before \
              Signal C fires. Tokens legitimately execute multi-round mints (airdrops, \
              LP seeding, team vesting) within the first two weeks. A 14-day floor \
              prevents false positives on legitimate launch-phase activity while \
              remaining short enough to catch early rugs. Design derivation; \
              no prior academic citation. Calibrate from labelled corpus in Sprint 5."""
refs      = ["D06/mint_burn_anomaly"]

[mint_burn_anomaly.established_protocol_confidence_dampening]
value     = 0.5
rationale = """Signal A confidence multiplier for established protocols (is_established_protocol \
              = true). Value 0.5 halves base confidence from 0.20 to 0.10, retaining \
              Signal A at Info severity for audit observability while preventing spurious \
              Medium alerts on regulated stablecoins (USDC, PYUSD). Full suppression \
              is rejected because it would hide the audit trail. 0.5 halving is \
              consistent with the D02/D03 asymmetric suppression pattern (P4-0). \
              Source: token_status.rs P4-0; docs/designs/0005-detector-02-rug-pull.md §14."""
refs      = ["D06/mint_burn_anomaly"]

[mint_burn_anomaly.non_lp_recipient_signal_weight]
value     = 0.30
rationale = """Additive confidence bonus when the mint recipient is NOT a known LP contract. \
              Non-LP recipient is the key distinguishing feature between a hidden mint \
              (attacker benefits) and legitimate treasury/LP mint (protocol benefits). \
              0.30 elevates baseline Signal B confidence from 0.55 to 0.85 at threshold, \
              placing it firmly in the High severity band. Calibrated so borderline cases \
              (exactly at supply_change_threshold) reach High; above threshold saturates \
              the 0.85 cap. Classified as unverified-heuristic; calibrate from labelled \
              corpus in Sprint 5. \
              Source: Sun et al. 2024 hidden mint recipient analysis; design derivation."""
refs      = ["D06/mint_burn_anomaly"]

# ---------------------------------------------------------------------------
# D07 — Token-2022 Withdraw-Withheld Drain
# ---------------------------------------------------------------------------
# Primary source: docs/designs/0012-detector-07-withdraw-withheld.md §7
# Signal A: active extraction event (WithdrawWithheld* instructions, cumulative USD)
# Signal B: authority rotation alert (SetAuthority{WithdrawWithheldTokens})
# All thresholds classified as unverified-heuristic; calibrate from labelled
# corpus in Sprint 6 once real withdraw_withheld rug incidents are documented.
# ---------------------------------------------------------------------------

[withdraw_withheld.min_extraction_events]
value     = 3
rationale = """Single extraction events can occur in legitimate protocol fee collection (e.g.,
              a protocol sweeping a small treasury fee monthly). Three events within the 7-day
              detection window indicates an operational extraction pattern rather than a one-off
              treasury operation. Classified as unverified-heuristic; calibrate from labelled
              corpus in Sprint 6 once real withdraw_withheld rug incidents are documented."""
refs      = ["D07/withdraw_withheld_drain"]

[withdraw_withheld.min_cumulative_withdraw_usd]
value     = 1000.0
rationale = """$1,000 USD filters noise from micro-extractions on dust-value tokens or from
              low-fee tokens where withheld balances accumulate slowly. Calibrated to match the
              D02 min_pool_usd floor (Chainalysis 2025: $1,000 as the dust filter for LP drain
              significance). Any extraction below $1,000 has negligible impact on bot-trader
              positions. Classified as unverified-heuristic; review against first live rug corpus."""
refs      = ["D07/withdraw_withheld_drain", "Chainalysis2025/rug-pull-base-rate"]

[withdraw_withheld.authority_rotation_window_days]
value     = 30
rationale = """Signal B looks back 30 days for rotation events. Consistent with D02
              minimum_lock_horizon_days (30d) and D06 hidden_mint_window_days (30d) for
              detection window coherence. A 30-day lookback covers at least 4 rotation cycles
              for an attacker rotating every 8 days (E-D07-2 evasion pattern)."""
refs      = ["D07/withdraw_withheld_drain"]

[withdraw_withheld.min_authority_tenure_days]
value     = 7
rationale = """Authorities holding the withdraw_withheld_authority role for fewer than 7 days
              before rotation are classified as disposable keys. 7 days is consistent with D06
              mint_authority_grace_period_days (Sun et al. 2024: non-rugged tokens revoke
              within 1-7 days; rugged tokens rarely revoke). A withdrawal authority active for
              fewer than 7 days has not established a track record of legitimate operation."""
refs      = ["D07/withdraw_withheld_drain", "Sun2024/hidden-mint-authority-rotation"]

[withdraw_withheld.min_withheld_at_rotation_usd]
value     = 500.0
rationale = """The minimum accumulated withheld value at the time of a Signal B authority rotation
              for the fresh_wallet_bonus to apply. Rotations when withheld balance is below $500
              carry lower immediate risk (the attacker has less to extract). $500 is half the
              Signal A USD threshold ($1,000), calibrated to surface pre-extraction rotations
              while filtering dust-value rotations. Unverified-heuristic."""
refs      = ["D07/withdraw_withheld_drain"]

[withdraw_withheld.fresh_wallet_funding_hours]
value     = 24
rationale = """Lowered 48→24 per review 0004 §4 T3. 48h was trivially evaded by funding the new \
              authority wallet 49 hours before the SetAuthority instruction — a one-day planning \
              buffer achievable in any token-launch playbook. 24h increases operational friction \
              (wallet creation costs ~0.000005 SOL on Solana) without impacting legitimate \
              same-day key ceremonies: hardware wallet rotations and Squads multisig setup \
              funded on the day of rotation still trigger the fresh-wallet check, which is the \
              correct behavior — it warrants human review, not automatic suppression. Calibrate \
              against first live rug corpus in Sprint 7."""
refs      = ["D07/withdraw_withheld_drain", "D02-review-E-D02-11/disposable-wallet", "review/0004-d07-evasions-§4-T3"]

[withdraw_withheld.detection_window_hours]
value     = 168
rationale = """7-day detection window for Signal A extraction event accumulation. Consistent with
              D04/D05 7-day observation windows. Long enough to aggregate slow-drip extraction
              patterns (E-D07-1) and short enough to remain operationally actionable — a 7-day-old
              extraction event still affects open bot-trader positions in a token with active
              trading volume."""
refs      = ["D07/withdraw_withheld_drain"]

[withdraw_withheld.cross_detector_composite_enabled]
value     = true
rationale = """Enable Signal C evidence-key emission (combined_with_d01_s2) for the scoring crate.
              When true, D07 checks transfer_fee_bps against D01 sell_tax_threshold_bps and
              emits the linkage evidence key. Can be set to false in test environments where D01
              output is unavailable or in single-detector evaluation mode."""
refs      = ["D07/withdraw_withheld_drain"]

[withdraw_withheld.established_protocol_fee_extraction_allowlist_pct]
value     = 0.50
rationale = """Lowered 0.90→0.50 per review 0004 §4 T2. The 0.90 threshold assumed legitimate \
              protocols could need up to 90% of pool volume as fees — implausible for any fee \
              structure below ~90% bps at full trading volume. A Token-2022 mint with 10% fee \
              (1000 bps) on a $100K/week pool accumulates $10K in fees; a ratio of 0.90 means \
              suppression applies at up to $90K extraction, which requires a >90% effective fee \
              rate — economically impossible at any normal fee rate. 0.50 still suppresses \
              legitimate high-fee tokens while closing E-D07-12 (compromised authority extracting \
              85–89% just below the old 0.90 threshold). IMPORTANT: this threshold is non-operational \
              in MVP while pool_volume_usd is stubbed to 0.0 (ACCEPTED-RISK-D07-01). It MUST be \
              lowered to a corpus-calibrated value before DG-D07-2 ships (pool_volume_usd query \
              activation)."""
refs      = ["D07/withdraw_withheld_drain", "review/0004-d07-evasions-§4-T2"]

[withdraw_withheld.min_single_event_withdraw_usd]
value     = 5000.0
rationale = """E-D07-9 evasion mitigation (review 0004 §4 T1): single-event large extractions \
              bypass the min_extraction_events=3 gate. An attacker who calls \
              HarvestWithheldTokensToMint repeatedly to consolidate value into the mint's withheld \
              balance and then calls WithdrawWithheldTokensFromMint once avoids Signal A entirely \
              because event_count=1 is below min_extraction_events=3. Second-tier Signal A fires \
              when event_count==1 AND cumulative_usd >= $5,000 at confidence 0.65 (High); \
              event_count==2 fires at confidence 0.60. Three or more events use the primary \
              formula. $5,000 chosen as 5× min_cumulative_withdraw_usd to ensure the single event \
              represents meaningful value and not routine dust sweeps."""
refs      = ["D07/withdraw_withheld_drain", "review/0004-d07-evasions-§4-T1"]

# ---------------------------------------------------------------------------
# D08 — Sybil Bundled-Launch
# Full implementation: Sprint 11 S11-6 (docs/designs/0015-crates-graph-phase3.md §6)
# Primary sources:
#   Liu et al. 2025 — https://arxiv.org/abs/2505.09313
#     LightGBM Sybil classifier; AUC >0.90 on 193,701 addresses (23,240 labeled).
#     "Fraction of cluster members holding the token" is a top-5 feature.
#   Chainalysis 2025 — https://www.chainalysis.com/blog/crypto-market-manipulation-...
#     Heuristic 2: controller funds >=5 addresses; confirmed for $1.87B wash volume.
#     94% of rugged tokens had deployer-controlled holder bases.
#
# Two signals:
#   Signal A — cluster top-holder overlap (common-funder cluster in top-N holders)
#   Signal B — cluster confidence amplifier (scales A by wallet_clusters.confidence)
#
# Note: is_established_protocol suppression NOT applied to D08 per design 0015 §6.2.
#   Established tokens (BONK, WIF, RAY) can be Sybil-targeted for wash trading;
#   suppressing D08 on jup_strict tokens would mask those events.
# ---------------------------------------------------------------------------

[sybil_detection.sybil_cluster_top_holder_pct_threshold]
value     = 0.30
rationale = """30% of a common-funder cluster appearing as top holders of one token is a strong \
signal of coordinated accumulation. Liu et al. (2025) arxiv:2505.09313 use 'fraction of cluster \
members holding the token' as a top-5 feature in their LightGBM classifier; the paper does not \
publish an exact threshold but the feature importance rank justifies a low floor to maximise recall \
(CLAUDE.md: false negatives are expensive). Chainalysis (2025) Heuristic 2 requires >=5 funded \
addresses for wash trading attribution; 30% overlap at min_cluster_size=3 equals exactly 1 holder \
in a 3-member cluster, so the threshold effectively requires >1 cluster member as a holder \
(i.e. >33% overlap). Raise to 0.40 after empirical FP calibration on Sprint 11 fixture corpus."""
refs      = ["D08/sybil_detection"]

[sybil_detection.sybil_cluster_min_size]
value     = 3
rationale = """Minimum 3 cluster members. Chainalysis (2025) Heuristic 2 requires >= 5 funded \
addresses for wash trading attribution; 3 is the MVP lower bound matching min_cluster_size in \
graph.toml, to ensure D08 fires on any cluster that ClusterDetector emits. Liu et al. (2025) \
subgraph feature analysis confirms clusters of 3+ wallets with shared funding as statistically \
significant Sybil indicators (see Table 2 feature importance). Raise to 5 after empirical FP \
calibration on Sprint 11 fixture corpus."""
refs      = ["D08/sybil_detection"]

# ---- D08 Smart-money amplification (Sprint 23, design 0023 §4.2) ----

[sybil_detection.smart_money_tier1_delta]
value     = 0.10
rationale = """Confidence delta when any Tier1 smart-money wallet is a cluster member. \
              Amplification direction: UPWARD (informed coordinated attacker, not vouching). \
              unverified-heuristic; Perseus 2025 (arXiv:2503.01686) + Liu et al. 2025 \
              (arXiv:2505.09313): smart-money in cluster = sophisticated adversarial coordination. \
              Slightly lower than D04 Tier1 (+0.12) because D08 base is structural/strong. \
              User-approved 2026-04-25. Design 0023 §4.2 Decision 4."""
refs      = ["D08/smart_money_amplification", "perseus_2025"]

[sybil_detection.smart_money_tier2_delta]
value     = 0.05
rationale = """Confidence delta when any Tier2 smart-money wallet is in the cluster (no Tier1). \
              unverified-heuristic. Design 0023 §4.2. User-approved 2026-04-25."""
refs      = ["D08/smart_money_amplification"]

[sybil_detection.smart_money_tier2_min_count]
value     = 2
rationale = """Minimum Tier2 wallet count in the cluster to unlock Tier2 amplification. \
