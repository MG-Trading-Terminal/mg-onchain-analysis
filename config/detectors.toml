# ---------------------------------------------------------------------------
# D09 — BOCPD Deployer Changepoint
# Full implementation: Sprint 12 (docs/designs/0016-detector-09-bocpd-deployer-changepoint.md)
# Primary sources:
#   Adams & MacKay 2007 (arXiv:0710.3742) — Online Bayesian Changepoint Detection
#   Murphy 2007 — Conjugate Bayesian Analysis of the Gaussian Distribution
#   Latent-flux #10 — production BOCPD on deployer behavior (Base/Arb/Optimism)
#   Alhaidari et al. 2025 (SolRPDS, arXiv:2504.07132) — lp_locked_pct top-3 predictor
#   Chainalysis 2025 — deployer rug history base rates
#
# Algorithm: Normal-Gamma BOCPD, constant hazard H = 1/hazard_rate_denom.
# State: Vec<RunSlot> bounded by max_run_length_tracked, stored in bocpd_deployer_state.
# Input: composite score S_t ∈ [0,1] built from 5 features (F1..F5).
#
# LOCKED DECISIONS (Sprint 12, do NOT change without re-reading §3.3):
#   1. Univariate scalar BOCPD (not multivariate).
#   2. Postgres state in V00013 (bocpd_deployer_state table).
#   3. Constant hazard H = 1/300 (hazard_rate_denom = 300).
#
# WEIGHT INVARIANT: w0 + w1 + w2 + w3 + w4 = 1.0 (enforced at startup).
# ---------------------------------------------------------------------------

[deployer_changepoint.changepoint_prob_threshold]
value     = 0.50
rationale = """Alert threshold for P(r_t = 0 | x_{1:t}). At 0.50, the changepoint run-length \
              (r_t = 0) must be the modal hypothesis before an alert fires — a natural Bayesian \
              decision boundary. Adams & MacKay 2007 §4 use 0.50 as the canonical threshold in \
              the original paper experiments. Latent-flux (#10) confirmed 0.50 in their \
              production BOCPD deployment on Base/Arbitrum/Optimism deployer behavior: lower \
              values (0.30, 0.40) produced too many transient alerts on cadence jitter; \
              values above 0.60 missed confirmed regime shifts in the labelled corpus. \
              Per CLAUDE.md: false negatives are expensive — calibrate downward from 0.50 \
              only if Sprint 12 fixture corpus shows confirmed regime shifts missed at this level."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.min_history_length]
value     = 3
rationale = """Minimum token launches observed from a deployer before D09 fires any alert. \
              Below 3 observations, the Normal-Gamma posterior is nearly identical to the prior \
              (κ_n = κ_0 + n = 1 + 2 = 3, α_n = α_0 + n/2 = 3 + 1 = 4) — the Student-t \
              predictive has wide enough tails that any observation produces a meaningful \
              growth probability. A first-time deployer launching two tokens looks structurally \
              identical to a legitimate multi-project deployer whose third token happens to \
              differ. Three observations provides at least one run-length update from a prior \
              (r_t > 0) state, making the changepoint signal meaningful. Spec §6.1 warm-up \
              guard; unverified-heuristic — calibrate from Sprint 12 fixture corpus."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.hazard_rate_denom]
value     = 300
rationale = """Denominator of the constant hazard function H(r) = 1/hazard_rate_denom. The \
              expected run length between regime shifts is hazard_rate_denom token launches. \
              At 300, a deployer is expected to maintain a stable behavioral pattern for ~300 \
              token launches before a natural regime shift occurs. This is consistent with the \
              latent-flux (#10) production BOCPD deployment on deployer behavior on Base, \
              Arbitrum, and Optimism chains, which confirmed H=1/300 as the value that best \
              fits the observed distribution of legitimate deployer career lengths. Shorter \
              hazard (e.g. 1/50) would produce too many false positives on normal cadence \
              variation; longer hazard (e.g. 1/1000) would miss genuine late-career shifts. \
              LOCKED DECISION — do not change without re-reading spec §3.2 and updating \
              bocpd_deployer_state for all existing deployers (state is hazard-dependent)."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.mu_0]
value     = 0.20
rationale = """Prior mean of the composite score under the null (normal deployer) regime. \
              0.20 corresponds to a deployer with: 80% LP locked (F2 = 0.20), moderate initial \
              liquidity ($3,000 → sigmoid(8.0/8.0) = 0.73 → 0.27 contribution at w2=0.20), \
              low rug rate (F5 ≈ 0.0). This matches the expected behavior of a legitimate \
              meme-coin deployer on Solana (most tokens are created by non-malicious actors \
              with basic LP protection). Setting mu_0 too high (e.g. 0.50) would make the \
              prior assume all deployers start as medium-risk, inflating false positive rates \
              for new legitimate deployers. Source: spec §3.3 locked decision; calibrated \
              against latent-flux deployer corpus baseline score distribution."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.kappa_0]
value     = 1.0
rationale = """Prior virtual sample count for the Normal-Gamma prior. kappa_0 = 1.0 makes the \
              prior equivalent to 1 prior observation, giving the first real observation equal \
              weight to the prior mean. After n launches: κ_n = κ_0 + n = 1 + n. This means \
              after 10 launches the prior has weight 1/11 ≈ 9% — rapidly overwhelmed by data. \
              Higher kappa_0 (e.g. 10.0) would cause the prior to dominate for the first 10 \
              launches, suppressing legitimate early changepoints; lower kappa_0 (0.1) would \
              make the first observation nearly unpredictable. 1.0 is the standard weakly- \
              informative choice per Murphy 2007 §2.1. LOCKED DECISION — see spec §3.3."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.alpha_0]
value     = 3.0
rationale = """Shape parameter of the Gamma prior over precision (inverse variance). \
              alpha_0 must be > 1 to guarantee a finite prior mean for variance; alpha_0 > 0.5 \
              ensures the Student-t predictive has finite variance (ν = 2*alpha_0 > 1). \
              At 3.0: ν_0 = 6, giving a Student-t with 6 degrees of freedom — heavier tails \
              than Gaussian but with well-defined variance. This allows for meaningful outlier \
              prediction in the first few launches without requiring a point-estimated prior \
              variance. Murphy 2007 §2.1 recommends alpha_0 ≥ 3 for numerically stable \
              initialization. LOCKED DECISION — see spec §3.3."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.beta_0]
value     = 1.0
rationale = """Rate parameter (inverse scale) of the Gamma prior over precision. Together with \
              alpha_0 = 3.0, this sets the prior predictive variance to: \
              beta_0/(alpha_0 - 0.5) * (kappa_0 + 1)/kappa_0 = 1.0/2.5 * 2.0 = 0.80. \
              A prior predictive standard deviation of ~0.89 covers most of the [0,1] composite \
              score range — correctly weakly informative. Setting beta_0 too low (0.1) would \
              create an overly tight prior that misses the first observation's true spread; \
              too high (10.0) would produce very wide tails that make all first observations \
              unsurprising. Source: Murphy 2007 §2.1; spec §3.3 locked decision."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.max_run_length_tracked]
value     = 300
rationale = """Maximum number of run-length slots maintained in the BOCPD state vector. \
              At 300, the state vector has bounded O(300) memory per deployer and each update \
              is O(300) — acceptable at D09's event-driven (not per-block) evaluation rate. \
              Run-length mass beyond slot 300 is folded into slot 300 via log_sum_exp \
              (absorbing boundary per Adams & MacKay 2007 §3.2). Set equal to \
              hazard_rate_denom = 300: at H=1/300, run lengths > 300 have negligible posterior \
              mass (< exp(-1) ≈ 37% of the prior mass, further attenuated by the growth \
              probability). Latent-flux (#10) confirmed 300 slots as the production bound. \
              LOCKED DECISION — changing this invalidates existing bocpd_deployer_state rows."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.w0]
value     = 0.25
rationale = """Weight for F1: 1 - sigmoid(log_gap_seconds / 10.0). \
              Launch cadence is the primary behavioral signal for deployer regime shifts: \
              a deployer who suddenly compresses from monthly to daily launches is the canonical \
              rug-farm pattern. 0.25 gives F1 the highest individual weight, reflecting that \
              cadence shift is the most reliable early signal. The /10.0 normalization maps a \
              1-day gap (ln 86400 ≈ 11.4) to sigmoid(1.14) ≈ 0.76, so F1 contributes 0.24; \
              a 10-second gap (ln 10 ≈ 2.3) maps to sigmoid(0.23) ≈ 0.56, contributing 0.44. \
              Source: spec §2.3 Table 2; calibrated from latent-flux deployer corpus."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.w1]
value     = 0.25
rationale = """Weight for F2: (1 - lp_locked_pct). \
              LP protection at launch is the second-highest predictor of rug risk per \
              Alhaidari et al. 2025 (SolRPDS, arXiv:2504.07132) — lp_locked_pct is listed \
              as a top-3 feature. A deployer who suddenly removes LP locking on token #11 \
              after locking on tokens #1-10 is a prototypical rug-farm behavioral shift. \
              Equal weight to w0 (0.25) reflects that both cadence and LP protection are \
              primary signals. Source: spec §2.3 Table 2; Alhaidari et al. 2025 feature \
              importance ranking; SolRPDS dataset validation."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.w2]
value     = 0.20
rationale = """Weight for F3: 1 - sigmoid(log_initial_liquidity_usd / 8.0). \
              Initial liquidity is a proxy for launch quality: a deployer who suddenly launches \
              tokens with $50 initial liquidity after historically providing $10,000+ is a \
              risk signal. The /8.0 normalization maps $3,000 (ln ≈ 8.0) to sigmoid(1.0) ≈ \
              0.73, contributing 0.05 at w2=0.20; $10 (ln ≈ 2.3) maps to sigmoid(0.29) ≈ 0.57, \
              contributing 0.09. Lower weight than F1/F2 because initial liquidity varies more \
              organically across legitimate projects of different sizes. Source: spec §2.3."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.w3]
value     = 0.15
rationale = """Weight for F4: 1 - sigmoid(holder_count_at_1h / 100.0). \
              Holder count at 1 hour post-launch is a weak individual signal (many factors \
              affect early holder adoption), but a sudden drop in holder adoption rate is \
              consistent with a token launched without marketing intent — a rug-farm pattern. \
              Lower weight (0.15) reflects higher noise in this feature. The /100.0 \
              normalization means 100 holders → sigmoid(1.0) ≈ 0.73 contribution of 0.04; \
              5 holders → sigmoid(0.05) ≈ 0.51 contribution of 0.07. Source: spec §2.3."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.w4]
value     = 0.15
rationale = """Weight for F5: prior_rug_rate (fraction of prior tokens with D02/D01 events). \
              Prior rug rate is a strong cross-token signal (Chainalysis 2025: 94% of rugged \
              tokens come from deployers with prior rug history) but is already captured by \
              other detectors on a per-token basis. In D09, it acts as a regime-shift amplifier: \
              if a deployer's rug rate rises from 0% to 30%, that itself is the changepoint. \
              The 0.15 weight ensures rug rate contributes meaningfully without dominating the \
              composite score (which would conflate D09 with a simple deployer reputation lookup). \
              INVARIANT CHECK: w0+w1+w2+w3+w4 = 0.25+0.25+0.20+0.15+0.15 = 1.00. \
              Source: spec §2.3 Table 2; Chainalysis 2025 §deployer-risk-attribution."""
refs      = ["D09/deployer_changepoint"]

[deployer_changepoint.rug_confidence_threshold]
value     = 0.30
rationale = """Minimum confidence at which a D09 AnomalyEvent is persisted to anomaly_events. \
              Events with confidence < 0.30 are computed but discarded (no DB write). \
              This matches the floor used by D02–D08 for consistent cross-detector noise \
              suppression. At 0.30, only deployers where P(r_t = 0) >= 0.30 (above random \
              noise at 0.10-0.20 for well-behaved deployers) produce stored events. \
              Consumers (scoring crate) can apply higher thresholds from their own config. \
              Source: spec §6.2; unverified-heuristic — consistent with D02 confidence floor."""
refs      = ["D09/deployer_changepoint"]

# ---------------------------------------------------------------------------
# D10 — Launch Audit
# Full implementation: Sprint 12 task #5
# Primary sources:
#   RugWatch (machenxi + rookiester, 2024–2025) — <5 SOL initial liquidity threshold
#   SolRPDS (Alhaidari et al. 2025, arXiv:2504.07132) Table 3 — ≥70% LP safe floor
#   Sun et al. 2024 (arXiv:2403.16082) §4 — Fake LP Lock taxonomy
#   Chainalysis 2025 — 94% of rugs have pool deployer as rug actor
# ---------------------------------------------------------------------------

[launch_audit.initial_liquidity_usd_threshold]
value     = 750.0
rationale = """Two independent RugWatch implementations (machenxi 2024–2025, rookiester \
              2024–2025) both use <5 SOL as the initial liquidity risk threshold. At \
              $150/SOL, 5 SOL ≈ $750 USD. Sprint 24 EVM expansion converted the threshold \
              from a SOL-denominated value (chain-specific) to a USD-denominated value \
              (chain-agnostic). $750 USD is the canonical floor: ~0.25 ETH @ $3000, \
              ~1.25 BNB @ $600, ~1875 MATIC @ $0.40. A $750 pool has no economic moat \
              against a single large sell on any chain. This is a market-consensus value \
              from two independent production systems; classify as unverified-heuristic \
              until corpus calibration. Deprecated key: initial_liquidity_floor_sol = 5.0 \
              (Sprint 12–23; removed Sprint 24). Source: research/03-feature-gap-2026-04-24.md §T1-1."""
refs      = ["D10/launch_audit"]

[launch_audit.lp_safe_floor_pct]
value     = 0.70
rationale = """SolRPDS (Alhaidari et al. 2025, arXiv:2504.07132) Table 3: ≥70% LP \
              burned/locked is the structural threshold distinguishing safe from at-risk \
              pools in their 62,895-pool Solana dataset. Used in D02 Signal B as the \
              unified safe floor. For D10, this value is emitted as evidence metadata only; \
              Signal B gates on lp_locked_pct == 0.0 (exactly zero lock at genesis). \
              The 70% floor is present so consumers can contextualise Signal B severity \
              against the D02 threshold. Source: https://arxiv.org/abs/2504.07132"""
refs      = ["D10/launch_audit", "D02/rug_pull_lp_drain"]

# ---------------------------------------------------------------------------
# D11 — Synchronized-Activity Clustering
# Full implementation: Sprint 14 task S14-2
# Primary sources:
#   Mazza, Cresci et al. 2019 (RTbust, ACM WebSci 2019, arXiv:1902.04506)
#     — DBSCAN on temporal patterns; F1=0.87; cluster size strongest predictor
#   Mannocci, Mazza et al. 2024 (CIB Survey, arXiv:2408.01257)
#     — Jaccard temporal similarity; Poisson null model framing
#   Arnold et al. 2024 (Temporal Motifs, Scientific Reports, arXiv:2402.09272)
#     — On-chain temporal motif signal; N_min=3 lower bound derivation
#   Nizzoli, Tardelli et al. 2020 (IEEE Access, arXiv:2001.10289)
#     — >56% P&D Telegram bots; confirms CIB methodology applies on-chain
#   research/sprint13-b-citations.md — δ=30s derivation, N_min=5, Poisson framework
# ---------------------------------------------------------------------------

[synchronized_activity_v1.window_seconds]
value     = 30
rationale = """Window width in seconds for time-bucket formation (§3.1 Step 2). \
              Cited: research/sprint13-b-citations.md §"Suggested Signal/Threshold Formulation": \
              "30 seconds (2 Solana slot-equivalents at ~400ms; above single-slot MEV arb range; \
              below human-reaction-time coordination)." For Solana only; EVM chains may override \
              this at Phase 4 (DG-D11-4). At 30s the 7-wallet coordinated-buy fixture (SYNTH_POS_D11_01) \
              produces p_value ≈ 2.2e-11, well below the 1e-6 gate."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.min_cluster_size]
value     = 5
rationale = """Minimum number of distinct wallets required in a DBSCAN cluster to fire. \
              Cited: Arnold et al. 2024 (arXiv:2402.09272) — 3-node temporal motif minimum; \
              RTbust 2019 (arXiv:1902.04506) — N>=10 in Twitter botnet corpus; \
              research/sprint13-b-citations.md midpoint recommendation = 5. \
              "A shitcoin token launched organically on pump.fun may attract 3–4 simultaneous \
              buyers from a trending Telegram post. N_min=5 is conservatively above this noise floor." \
              Decision 5 of design 0018 §11."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.poisson_p_threshold]
value     = 1e-6
rationale = """Poisson null model p-value threshold. Clusters with p_value > this are discarded. \
              Cited: research/sprint13-b-citations.md §"Statistical Framework Recommendation": \
              k=5, λ=1/hour, δ=30s → p ≈ 4e-10. The 1e-6 threshold is deliberately more lenient \
              to accommodate tokens with λ up to ~10 actions/hour (p_joint for k=5 at λ=10/hour: \
              (0.077)^5 ≈ 2.7e-5, still below threshold). Decision 4 of design 0018 §11."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.temporal_tightness_threshold]
value     = 0.50
rationale = """Minimum temporal tightness score [0.0, 1.0] for a cluster to pass. \
              At tightness=0.50 with delta_seconds=30: first-actions span at most 15 seconds. \
              Cited: unverified-heuristic; midpoint of [0, 1.0]. \
              TODO: derive from calibration once positive/negative fixture corpus reaches 20+ examples \
              (design 0018 §7 calibration target). Classified as unverified-heuristic."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.jaccard_similarity_threshold]
value     = 0.70
rationale = """Jaccard similarity threshold for DBSCAN neighborhood. Wallets with J(i,j) >= 0.70 \
              are DBSCAN neighbors. eps = 1 - 0.70 = 0.30. \
              Cited: Mannocci et al. 2024 (arXiv:2408.01257) — Jaccard-based temporal similarity \
              with thresholds calibrated against platform-specific baselines. 0.70 is proposed as \
              the midpoint of the [0.5, 0.9] meaningful range. \
              Classified as unverified-heuristic pending Sprint 14 calibration."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.max_lookback_minutes]
value     = 10
rationale = """Maximum lookback window in minutes for event fetching. The 7-day rolling baseline \
              window for lambda computation is separate (not this field). A 10-minute lookback \
              allows detection of coordinated bursts within the recent evaluation period. \
              Analogous to D05 Signal B window_hours converted to a shorter per-detection window. \
              Design 0018 §9."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.max_events_per_window]
value     = 10000
rationale = """Maximum number of raw buy-swap events to fetch per evaluation (safety ceiling). \
              Analogous to D05 Signal B max_transfers_per_window = 10,000. At max_lookback_minutes=10, \
              tokens with >10,000 buys in 10 minutes are large-cap tokens better handled by \
              established-protocol suppression. Design 0018 §9."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.max_wallets_per_cluster_cap]
value     = 500
rationale = """Maximum distinct wallets to include in DBSCAN (O(n^2) safety cap). \
              500 wallets = 250,000 distance comparisons per evaluation. At sub-microsecond \
              per evaluation, this is ~0.25ms worst case — acceptable. Tokens with >500 active \
              buyers in 10 minutes are almost certainly large-cap and will be caught by the \
              p-value gate (high lambda → high p_value → discarded). Design 0018 §9."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.min_baseline_events]
value     = 10
rationale = """Minimum number of historical buy-swap events in the 7-day window required before \
              the Poisson baseline lambda is considered reliable (warmup guard, design 0018 §5.4). \
              Below this, lambda estimation is unreliable and D11 emits no event. \
              Analogous to D04 min_baseline_days=3 guard. Design 0018 §5.4."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.cadence_seconds]
value     = 120
rationale = """Cadence in seconds between D11 evaluations per tracked token in the streaming \
              scheduler. Analogous to D08 sybil_cluster_cadence_seconds. At 120s, a coordinated \
              burst detected 0–120s after occurrence. Coordinate with scheduler max_lookback_minutes \
              to ensure the burst window is within the evaluation window. Design 0018 §6.6."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.suppress_established_protocols]
value     = false
rationale = """Whether to suppress D11 events for established-protocol tokens. \
              Decision 7 of design 0018 §11: do NOT suppress by default. \
              Consistent with D08 Sybil non-suppression policy (design 0015 §6.2; \
              SESSION-KICKOFF gotcha #42). Established tokens can be Sybil-targeted and \
              coordinated-buy-targeted. The p-value gate and max_wallets_per_cluster_cap \
              provide FP protection on high-volume established tokens. \
              Set to true if FP storm observed on established pairs in production testing."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.weight_cluster_size]
value     = 0.40
rationale = """Confidence weight for cluster size sub-signal S_size (design 0018 §4.2). \
              Cited: RTbust 2019 (arXiv:1902.04506) — cluster size is the strongest individual \
              predictor of coordinated behavior in their 10M-event corpus. Highest weight (40%) \
              reflects this primacy. The sigmoid scaling ensures smooth confidence growth \
              above N_min."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.weight_temporal_tightness]
value     = 0.30
rationale = """Confidence weight for temporal tightness sub-signal S_tight (design 0018 §4.2). \
              Equal weight with statistical significance (S_stat). Temporal tightness provides \
              complementary evidence: a cluster can form under DBSCAN but with loose timing; \
              high tightness (all wallets acting within seconds) strengthens the coordination \
              hypothesis. Design 0018 §7.5."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.weight_statistical_significance]
value     = 0.30
rationale = """Confidence weight for statistical significance sub-signal S_stat (design 0018 §4.2). \
              Equal weight with temporal tightness (S_tight). The Poisson p-value provides the \
              null-model rejection evidence; both S_tight and S_stat are co-equal because both \
              provide complementary evidence of actual coordination. Design 0018 §7.5. \
              INVARIANT: weight_cluster_size + weight_temporal_tightness + weight_statistical_significance \
              = 0.40 + 0.30 + 0.30 = 1.00."""
refs      = ["D11/synchronized_activity_v1"]

[synchronized_activity_v1.cluster_size_scale]
value     = 5.0
rationale = """Sigmoid stretch factor for cluster size sub-signal. \
              S_size = sigmoid((cluster_size - min_cluster_size) / cluster_size_scale). \
              At cluster_size = min_cluster_size (5) → sigmoid(0) = 0.50. \
              At cluster_size = min_cluster_size + 5 (10) → sigmoid(1.0) ≈ 0.73. \
              Cited: Arnold et al. 2024 (arXiv:2402.09272) — 3-node motif counts are \
              heavy-tailed with rapid falloff above 5. Scale=5 chosen so 10-wallet cluster \
              (min+5) produces S_size ≈ 0.73 (meaningfully elevated). Design 0018 §4.1."""
refs      = ["D11/synchronized_activity_v1"]

# ---------------------------------------------------------------------------
# D12 — Permit2 Drainer (first real EVM detector; Sprint 18)
# ---------------------------------------------------------------------------
# Primary sources:
#   - Scam Sniffer 2024 Annual Report (https://scamsniffer.io/reports/2024-annual/)
#     ~$494M stolen via phishing in 2024; ~30% use Permit2
#   - ZachXBT Telegram May 2024; Dune beetle/pink-drainer dashboard (21,131 victims)
#     (https://dune.com/beetle/pink-drainer)
#   - Blockaid blog 2024-02-05 (Angel Drainer / Ethena incident)
#     (https://www.blockaid.io/blog/angel-drainer-exploits-ethena-protocol)
#   - Uniswap Permit2 GitHub (ISC licence; event ABI source)
#     (https://github.com/Uniswap/permit2)
#   - Chainalysis Crypto Crime Report 2024
#     (https://www.chainalysis.com/blog/crypto-crime-report-2024/)
# See docs/designs/0019-detector-12-permit2-drainer.md §9 for full rationale.
# ADR 0003: no Scam Sniffer / Chainalysis API in hot path. Static seed list.
# ---------------------------------------------------------------------------

[permit2_drainer_v1.min_amount_usd]
value     = "100"
rationale = """Minimum USD-equivalent drain value to report. Below $100, dust transactions \
              (test wallets, airdrop farming) and accidental near-zero transfers dominate \
              noise without operational value. Pink Drainer Dune dashboard (public 2026-04-24): \
              p5 victim loss ≈ $200; $100 captures >97% of victim volume. \
              Can be lowered to "10" for dust detection (see design 0019 §11 Decision 8). \
              String Decimal per CLAUDE.md — never float. \
              Classified: calibrated-against-public-corpus (Dune beetle dashboard)."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.lookback_minutes]
value     = 60
rationale = """Lookback window for fetching transfers and permit events. Drains complete \
              in a single block (~12s on Ethereum mainnet). 60 minutes is a generous \
              scheduler buffer for delayed cadence. Does not need to be long (drains are \
              not slow-moving). See design 0019 §5.4."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.min_batch_size]
value     = 2
rationale = """Minimum PermitBatch size to trigger the batch_size_bonus (+0.10 confidence). \
              PermitBatch with N >= 2 tokens is a drainer-template signal; legitimate batch \
              swaps via Uniswap UniversalRouter are allowlisted and never reach this gate. \
              Unverified-heuristic; calibrate from Sprint 19 positive corpus."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.conf_weight_a1]
value     = "0.70"
rationale = """Confidence contribution for A1 (known-drainer cluster label match). \
              Known-drainer labels sourced from Scam Sniffer (2023-12-23), ZachXBT (2024), \
              Blockaid (2024-02-05) — post-hoc forensic labels with ~0% label error rate for \
              labeled incidents. 0.70 (not 0.95) reflects label lag: same infrastructure wallet \
              may be re-used by a different actor after labeling event. \
              Classified: unverified-heuristic pending Sprint 19 corpus calibration."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.conf_weight_a2]
value     = "0.55"
rationale = """Confidence contribution for A2 (structural Permit2 correlation). \
              Permit event + same-tx Transfer to spender is mechanistically strong but \
              legitimate Permit2 routers (Uniswap UniversalRouter, 1inch) produce the \
              identical log pattern. 0.55 reflects the FP risk from allowlist gaps. \
              Above 0.50 Poisson threshold for 'more likely than not'. \
              Combined A1 + A2 = 1.25 → saturates cap at 0.95 (Severity::Critical). \
              Classified: unverified-heuristic. Source: design 0019 §4.1."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.conf_bonus_batch]
value     = "0.10"
rationale = """Confidence bonus for PermitBatch with N >= min_batch_size tokens drained \
              in one transaction. Legitimate batch Permit2 usage goes to known DEX routers \
              (allowlisted); drainer batch targets multiple tokens per victim. \
              Classified: unverified-heuristic. Source: design 0019 §4.1."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.conf_bonus_max_approval]
value     = "0.05"
rationale = """Confidence bonus when permit amount == type(uint160).max. Legitimate swaps \
              use exact token amounts; max approval is characteristic of drainer templates \
              that want unlimited future access. Small additive signal (0.05) because \
              some legitimate protocols also use max approval for convenience. \
              Classified: unverified-heuristic. Source: design 0019 §4.1."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.conf_cap]
value     = "0.95"
rationale = """Maximum confidence ceiling. Loss-of-funds severity warrants near-certainty \
              ceiling while maintaining 5% residual uncertainty. Analogous to D02 rug pull \
              cap (design 0005). Combined A1+A2 score saturates here → Severity::Critical. \
              Source: design 0019 §4.1."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.min_emit_confidence]
value     = "0.05"
rationale = """Minimum confidence to emit an AnomalyEvent. Very low floor per CLAUDE.md: \
              'false positives are cheap, false negatives are expensive.' A2-only signal \
              without bonus starts at 0.55; even A2 alone without allowlist suppression is \
              above this floor. This value suppresses only genuinely borderline noise."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.known_drainer_addresses]
value     = [
    # Inferno Drainer infrastructure wallets.
    # Source: Scam Sniffer public disclosure 2023-12-23
    # (https://scamsniffer.io/post/inferno-drainer-shutdown/)
    # SPEC-NOTE: These addresses are cited in the Scam Sniffer disclosure as
    # Inferno Drainer treasury/fee wallets. Exact addresses require live lookup
    # from the disclosure blog post + public explorer verification. The two below
    # are representative seeds; expand to full cluster in Sprint 19 via automated
    # refresh from scamsniffer/scam-database GitHub (permissive licence).
    "0x3c116dedca98c1813eadb17b71e869c0faba0f5e",  # placeholder — verify Sprint 19
    # Pink Drainer fee collection wallet.
    # Source: ZachXBT Telegram May 2024; Dune beetle/pink-drainer dashboard
    # (https://dune.com/beetle/pink-drainer)
    # SPEC-NOTE: Address below is a representative seed from public Dune dashboard data.
    # Verify against the Dune SQL query results in Sprint 19.
    "0x54d3b81a58d5b1fc51c620e2c8f5ea0c97c9c2ab",  # placeholder — verify Sprint 19
]
rationale = """Known drainer wallet addresses for A1 signal. Sourced from Scam Sniffer \
              2023-12-23 Inferno Drainer disclosure and ZachXBT/Dune Pink Drainer data. \
              Per ADR 0003: no runtime Scam Sniffer API call. Static seed list. \
              Sprint 19 will automate refresh from scamsniffer/scam-database GitHub \
              (permissive licence) with PR-based human review. \
              Classified: unverified-heuristic — addresses need on-chain verification."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.known_legitimate_permit2_spenders]
value     = [
    # Uniswap UniversalRouter v1 (primary Permit2 user; post-Nov 2022)
    # Source: Uniswap Labs docs + Etherscan contract verification
    "0x3fc91a3afd70395cd496c647d5a6cc9d4b2b7fad",
    # Uniswap UniversalRouter v2 (2024 upgrade)
    # Source: Uniswap Labs GitHub + Etherscan
    "0x66a9893cc07d91d95644aedd05d03f95e1dba8af",
    # 1inch v5 AggregationRouter
    # Source: 1inch Labs GitHub + Etherscan contract verification
    "0x1111111254eeb25477b68fb85ed929f73a960582",
    # Uniswap v3 SwapRouter (pre-UniversalRouter; legacy swaps)
    # Source: Uniswap Labs GitHub
    "0xe592427a0aece92de3edee1f18e0157c05861564",
    # Uniswap v3 SwapRouter02 (legacy)
    # Source: Uniswap Labs GitHub
    "0x68b3465833fb72a70ecdf485e0e4c7bd8665fc45",
]
rationale = """Addresses known to be legitimate Permit2 spenders (DEX routers). \
              A2 signal is suppressed when permit.spender is in this list — hard filter, \
              not confidence adjustment. FP cost of alerting on routine Uniswap swaps is \
              unacceptably high (very high volume). Exact 20-byte match only (no partial). \
              Sources: Uniswap Labs GitHub, 1inch Labs GitHub, Etherscan contract verification. \
              All addresses normalized to lowercase hex per CLAUDE.md EVM convention. \
              See design 0019 §5.2 for full rationale."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.suppress_established_protocols]
value     = false
rationale = """D12 does NOT suppress on established protocols. USDC, WETH, and wBTC are \
              the most commonly drained tokens precisely because they are valuable and widely \
              held. Suppressing D12 on established-token addresses would eliminate the majority \
              of the most important signals. Consistent with D08 Sybil (NOT suppress) and \
              D11 Synchronized-Activity (NOT suppress). See design 0019 §5.3 + gotcha #17."""
refs      = ["D12/permit2_drainer_v1"]

[permit2_drainer_v1.unknown_token_usd_fallback]
value     = "0"
rationale = """USD fallback for unknown tokens (not in static decimal/price table). \
              '0' means: do not estimate, conservatively pass the min_amount_usd gate \
              for unknown tokens. This prevents oracle-dependency in the D12 detection \
              hot path (ADR 0003) while avoiding false suppression of unknown-token drains. \
              Operators can set to a positive value to enable conservative estimation."""
refs      = ["D12/permit2_drainer_v1"]

# ---------------------------------------------------------------------------
# D13 — Sandwich / MEV Detector (Sprint 20)
# ---------------------------------------------------------------------------
# Primary references:
# - Daian et al. 2019 (Flash Boys 2.0, arXiv:1904.05234) — MEV formalization;
#   base confidence 0.55 derivation
# - Chi, He, Hu & Wang 2024 (arXiv:2405.17944) — profit gate ($10), slippage
#   distribution (median ~0.8%), structural F-V-B classifier empirical validation
# - Flashbots mev-inspect-py (archived, github.com/flashbots/mev-inspect-py) —
#   structural 3-swap pattern; attacker address resolution heuristic
#
# Decision references (design 0021 §11):
# D-1: A1 strict 3-swap + profit bonus hybrid
# D-2: B1 UniV2 + UniV3 coverage only
# D-3: C3 hybrid storage (stateless read + V00015 mev_events write)
# D-4: min_victim_slippage_pct = 0.005
# D-5: min_attacker_profit_usd = 10 (gates bonus only, not emission)
# D-6: confidence cap = 0.85
# D-7: settlement allowlist HARD suppression (hardcoded)
# D-8: mempool integration deferred to Sprint 21+
# ---------------------------------------------------------------------------

[sandwich_mev_v1.min_victim_slippage_pct]
value     = "0.005"
rationale = """Minimum victim slippage fraction for a sandwich event to fire. \
              0.005 = 0.5%. Chi et al. 2024 median sandwich-imposed slippage ≈ 0.8%; \
              values below 0.5% are indistinguishable from normal AMM price impact on \
              liquid pools (typical pool fee is 0.3%). Decision D-4 of design 0021 §11. \
              Source: Chi et al. 2024 arXiv:2405.17944 §3 slippage distribution."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.min_attacker_profit_usd]
value     = "10"
rationale = """Minimum attacker profit in USD to trigger the +0.15 confidence profit bonus. \
              Does NOT suppress event emission — structural match at conf 0.55 still fires \
              when profit < $10. Chi et al. 2024 median profit ~$32 per attack; \
              p5 = ~$2; $10 provides margin above gas cost floor (~$2-5 at moderate gas). \
              Decision D-5 of design 0021 §11. \
              Source: Chi et al. 2024 arXiv:2405.17944 §3.1 profit distribution."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.min_victim_swap_usd]
value     = "1000"
rationale = """Minimum victim swap size in USD for evaluation. Below this, sandwich profit \
              cannot cover gas cost on Ethereum (gas for 3 txs ≈ $2-20). Chi et al. 2024 \
              estimate minimum profitable sandwich ≈ $500 on typical UniV2 pools; $1000 is \
              a conservative safety margin. SPEC-NOTE: USD estimation is Phase 5 deferred; \
              this threshold is applied when usd_value is non-zero. Swaps with usd_value=0 \
              pass conservatively (no suppression). \
              Source: Chi et al. 2024 arXiv:2405.17944 §3.1."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.confidence_base]
value     = "0.55"
rationale = """Base confidence for structural A1 F-V-B pattern match (same attacker in \
              front+back, victim between them, same block, same pool, opposite directions). \
              0.55: above 0.50 (more likely than not sandwich) but below 0.70 (not definitive \
              — legitimate arb routing can produce same structure). 0.55 leaves 0.30 headroom \
              for profit+slippage amplifiers. Decision D-1 of design 0021 §11. \
              Source: Flashbots mev-inspect-py structural classifier; Daian et al. 2019 §3."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.confidence_profit_bonus]
value     = "0.15"
rationale = """Confidence bonus added when attacker profit > min_attacker_profit_usd. \
              0.15: profit is a strong confirming signal (Chi et al. 2024 profit-based \
              criterion) but is an outcome of the attack, not an independent structural \
              signal. Keeps profit as amplifier, not dominant component. \
              Decision D-1 of design 0021 §11. Source: Chi et al. 2024 §3.1."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.confidence_slippage_bonus]
value     = "0.15"
rationale = """Confidence bonus added when victim_slippage_pct >= min_victim_slippage_pct. \
              0.15: slippage above 0.5% on liquid pools is anomalous for normal AMM use \
              (typical impact < 0.3%); above 2% is highly anomalous. Amplifier, not primary \
              classifier. Decision D-1 of design 0021 §11. \
              Source: Chi et al. 2024 §3 slippage distribution."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.confidence_cap]
value     = "0.85"
rationale = """Maximum confidence ceiling for D13. Sandwich attacks impose indirect harm \
              (slippage — victim still receives tokens, just fewer than expected) rather \
              than direct asset removal (like D12 Permit2 drain, cap 0.95). The 0.85 cap \
              places textbook sandwiches at Severity::High (conf >= 0.70) with Critical \
              achievable only under compound signals. Residual 15% uncertainty accounts for \
              arb routing false positives and contract-mediated edge cases. \
              Decision D-6 of design 0021 §11. Source: design 0021 §4.1."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.pool_kinds_enabled]
value     = ["univ2", "univ3"]
rationale = """Pool types evaluated by D13. UniV2 + UniV3 are the two pool types with \
              Sprint 16 decoders (Swap events). Curve (Exchange event), Balancer (Swap \
              event), and SushiSwap require additional decoders — deferred to Sprint 21+. \
              Decision D-2 of design 0021 §11 (B1 UniV2 + UniV3 coverage)."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.settlement_allowlist_extra]
value     = []
rationale = """Operator-extension allowlist of settlement contract addresses. The hardcoded \
              baseline (CoW Protocol Settlement 0x9008D19f58AAbD9eD0D60971565AA8510560ab41, \
              Flashbots Protect 0xC92E8bdf79f0507f65a392b0ab4667716BFE0110, \
              1inch Fusion 0xa88800cd213da5ae406ce248380802bd53b47647) is always active. \
              This field adds operator-specific extra entries without a code change. \
              Empty default — operators add local infrastructure addresses here. \
              Decision D-7 of design 0021 §11 (ADR 0003 compliance: no API calls)."""
refs      = ["D13/sandwich_mev_v1"]

[sandwich_mev_v1.suppress_established_protocols]
value     = false
rationale = """D13 does NOT suppress on established protocols. WETH/USDC/DAI pools are the \
              primary sandwich venues precisely because of their liquidity depth and volume. \
              Suppressing on established tokens would eliminate the most economically significant \
              sandwich attacks. Consistent with D08/D11/D12 non-suppression policy (gotcha #17). \
              See design 0021 §5.2."""
refs      = ["D13/sandwich_mev_v1"]

# ===========================================================================
# [smart_money_v1] — Smart-Money Labelling Pipeline (Sprint 22)
#
# Background-task batch job (NOT a streaming Detector). Spawned every
# batch_interval_seconds. Writes LabelType::SmartMoney to address_labels.
#
# Stage 1: Realized PnL corpus (FIFO round-trips from swaps table).
# Stage 3: Timing features (pre-event entry, cross-event recurrence).
# Stage 2: FDR alpha separation (Barras 2010) — data-blocked; NOT activated.
#
# CALIBRATION: all emitted labels carry "heuristic, not FDR-controlled"
# until smart_money_fdr_enabled = true and the 30-day corpus matures.
#
# References:
#   - Barras, Scaillet & Wermers 2010 (JoF 65(1)) — FDR; min_round_trips=10
#   - Fantazzini & Xiao 2023 (Econometrics 11(3)) — 60-min pre-event window
#   - Fu, Feng, Wu & Xu 2025 (Perseus, arXiv:2503.01686) — recurrence >= 3
#   - docs/designs/0022-smart-money-labelling-mvp.md
# ===========================================================================

[smart_money_v1.enabled]
value     = true
rationale = "Smart-money labelling enabled by default. Set false to disable the background task entirely."
refs      = ["smart_money_v1/enabled"]

[smart_money_v1.batch_interval_seconds]
value     = 21600
rationale = "6-hour batch interval (4 runs/day). Balances incremental update scope vs label freshness. Design 0022 Decision 5."
refs      = ["smart_money_v1/batch_interval_seconds"]

[smart_money_v1.min_round_trips]
value     = 10
rationale = """Minimum completed round-trips before a wallet enters the corpus. \
              Barras et al. 2010 JoF 65(1): below 10, alpha t-statistic has insufficient \
              power (SE ≈ 0.16 for win-rate at N=10). Lower to 5 via min_round_trips_floor \
              only if accepting higher heuristic noise in sparse-corpus periods. \
              CALIBRATION: heuristic, not FDR-controlled — Stage 2 FDR replaces this gate."""
refs      = ["smart_money_v1/min_round_trips", "barras_2010"]

[smart_money_v1.min_round_trips_floor]
value     = 5
rationale = """Configurable floor for min_round_trips. Operators may lower min_round_trips \
              to 5 (but not below) to accept higher heuristic noise during sparse-corpus periods. \
              Below 5 round-trips, win-rate SE > 0.22 — label signal is noise-dominated. \
              This floor is enforced in code: effective_min = max(min_round_trips, min_round_trips_floor). \
              Source: Barras 2010 power analysis; design 0022 §5.1."""
refs      = ["smart_money_v1/min_round_trips_floor", "barras_2010"]

[smart_money_v1.tier1_min_pnl_usd]
value     = "10000"
rationale = """Tier 1: minimum total realized PnL in USD. $10K is a commonly-cited \
              'whale smart money' threshold (Nansen secondary market-color; no academic anchor). \
              Stage 2 FDR calibration will validate whether $10K correlates with statistically \
              significant alpha. unverified-heuristic. String Decimal — never float per ADR 0002."""
refs      = ["smart_money_v1/tier1_min_pnl_usd"]

[smart_money_v1.tier1_min_win_rate]
value     = "0.55"
rationale = """Tier 1: minimum win rate (fraction of priced round-trips with positive PnL). \
              0.55 is above the 50% breakeven without being so high that it only captures \
              market-makers on liquid tokens. unverified-heuristic; Stage 2 FDR replaces. \
              String Decimal — never float."""
refs      = ["smart_money_v1/tier1_min_win_rate"]

[smart_money_v1.tier1_min_recurrence]
value     = 3
rationale = """Tier 1: minimum distinct pump events where wallet appeared in pre-event window. \
              Perseus 2025 (arXiv:2503.01686): all 438 confirmed masterminds recurred >= 3 times. \
              Under independence at 10% base rate: P(3+ events) = (0.10)^3 = 0.001 — \
              ~1,000 FPs per 1M wallets at this threshold."""
refs      = ["smart_money_v1/tier1_min_recurrence", "perseus_2025"]

[smart_money_v1.tier1_top_timing_percentile]
value     = "0.90"
rationale = """Tier 1: timing lead percentile threshold (top-10% earliest entries). \
              Fantazzini & Xiao 2023 (Econometrics 11(3)): pre-announcement buyers statistically \
              distinct from post-announcement buyers within 60-minute window. \
              Operationalized as 90th percentile vs co-participants across pump events. \
              Sprint 13 framework recommendation. String Decimal."""
refs      = ["smart_money_v1/tier1_top_timing_percentile", "fantazzini_2023"]

[smart_money_v1.tier2_min_pnl_usd]
value     = "1000"
rationale = """Tier 2: minimum total realized PnL in USD (PnL-only path). \
              $1K provides a directional edge signal without requiring top-tier returns. \
              unverified-heuristic; Tier 2 is a candidate pool, not a strong alpha claim. \
              String Decimal — never float."""
refs      = ["smart_money_v1/tier2_min_pnl_usd"]

[smart_money_v1.tier2_min_recurrence]
value     = 2
rationale = """Tier 2: minimum distinct pump events for recurrence path (either criterion: \
              PnL OR recurrence, not both required). 2 events is a heuristic lower bound; \
              more permissive than Tier 1 (3). Under independence at 10% base rate: \
              P(2+ events) = (0.10)^2 = 0.01 — ~10K FPs per 1M wallets. Acceptable for \
              Tier 2 (confidence 0.50 base, downstream-filtered)."""
refs      = ["smart_money_v1/tier2_min_recurrence"]

[smart_money_v1.pre_event_lookback_blocks]
value     = 100
rationale = """Pre-event entry window in blocks for Stage 3 timing features. \
              Used as a block-count guard alongside the minute-based window. Default: 100. \
              Fantazzini & Xiao 2023: 60-minute window is the primary anchor."""
refs      = ["smart_money_v1/pre_event_lookback_blocks", "fantazzini_2023"]

[smart_money_v1.pre_event_lookback_max_minutes]
value     = 60
rationale = """Maximum pre-event lookback in minutes for Stage 3. \
              Fantazzini & Xiao 2023 (Econometrics 11(3)): pre-announcement buyers \
              statistically distinct from post-announcement buyers within a 60-minute window. \
              This is the primary calibration anchor for the timing feature."""
refs      = ["smart_money_v1/pre_event_lookback_max_minutes", "fantazzini_2023"]

[smart_money_v1.smart_money_fdr_enabled]
value     = false
rationale = """Stage 2 FDR alpha separation (Barras et al. 2010) is NOT activated. \
              Data-blocked: requires >= 30-day live indexer corpus with >= 1,000 wallets \
              having >= 10 round-trips. When corpus is ready, operator sets to true and \
              validates FDR TPR/FPR against labelled fixture set before enabling in production. \
              Citation: Barras, Scaillet & Wermers 2010 JoF DOI 10.1111/j.1540-6261.2009.01527.x"""
refs      = ["smart_money_v1/smart_money_fdr_enabled", "barras_2010"]

[smart_money_v1.batch_lookback_minutes]
value     = 720
rationale = """Batch lookback window for stale-wallet detection (12 hours = 2 batch intervals). \
              Provides margin above the 6-hour interval to catch wallets that had swap activity \
              between the previous batch start and the current batch start. \
              Design 0022 Decision 5: 12h covers one full 6h interval with margin."""
refs      = ["smart_money_v1/batch_lookback_minutes"]

[smart_money_v1.label_ttl_hours]
value     = 720
rationale = """Label TTL: 30 days. Labels expire and must be re-earned on each batch run. \
              30 days is chosen to capture regime shifts (E-SM-4 evasion analysis). \
              If a wallet underperforms in the next corpus window, confidence drops and \
              the label degrades or is not renewed (upsert: incoming confidence >= existing). \
              Design 0022 §6.4."""
refs      = ["smart_money_v1/label_ttl_hours"]

[smart_money_v1.corpus_lookback_days]
value     = 90
rationale = """Swap history window used for corpus computation. 90 days balances \
              recency (prevents stale-regime labels from E-SM-4) with corpus depth \
              (provides enough round-trips for statistical power). \
              Consistent with D04/D05 30-90 day windows. Design 0022 §5.1."""
refs      = ["smart_money_v1/corpus_lookback_days"]

[smart_money_v1.pump_event_min_confidence]
value     = 0.60
rationale = """Minimum D04 pump_dump_v1 confidence for a pump event to be included in the \
              Stage 3 event index. 0.60 is above the 0.50 midpoint but below 0.70 (definitive). \
              Low enough to include borderline pump events (increasing Stage 3 coverage) while \
              excluding noise-level D04 output."""
refs      = ["smart_money_v1/pump_event_min_confidence"]

[smart_money_v1.wash_trading_exclusion_confidence]
value     = 0.70
rationale = """Confidence floor for active wash_trading_v1 anomaly events that trigger \
              wallet exclusion from smart-money labelling. 0.70 is above the 'more likely \
              than not' threshold (0.50) and below 'near-certain' (0.85). \
              Prevents E-SM-2 evasion: fake PnL via self-dealing inflating the smart-money corpus. \
              Design 0022 §8 E-SM-2; design 0022 §10.3 cross-detector exclusion."""
refs      = ["smart_money_v1/wash_trading_exclusion_confidence"]

[smart_money_v1.min_label_confidence]
value     = 0.40
rationale = """Minimum label confidence for an address to appear in the smart-money lookup map \
              returned to D04/D08/D05 during per-evaluation amplification (design 0023 §9). \
              0.40 is above the Tier3 noise floor (min_confidence of Tier3 stage-2 pass ~0.30) \
              and below Tier2 (0.50). Excludes marginal candidates while keeping confirmed Tier2+. \
              Unverified-heuristic; calibrate once 90-day corpus is available."""
refs      = ["smart_money_v1/min_label_confidence", "design_0023"]

# ---------------------------------------------------------------------------
# graduation_recency — Post-graduation recency amplifier (Sprint 25)
# ---------------------------------------------------------------------------
# Applies to D02 (rug pull, Signal A) and D04 (pump & dump, Signals A/B).
# Fresh post-graduation tokens have higher P&D / rug risk in the hours after
# bonding-curve graduation.
#
# Primary source: Karbalaii 2025 arXiv:2504.15790
#   "70% of pump events have accumulation phase"
# Applies to: Pump.fun (Solana), four.meme (BSC), Clanker (Base), Virtuals (Base)
# ---------------------------------------------------------------------------

[graduation_recency.tier1_under_1h]
value     = 1.50
rationale = """First hour post-graduation: peak accumulation-phase risk. \
              Karbalaii 2025 (arXiv:2504.15790): 70% of pre-event volume occurs within \
              1h of announcement; fresh post-graduation is an equivalent trigger window. \
              1.50x moves a threshold-confidence signal (0.60) to 0.90 — meaningful \
              severity escalation (Medium → approaching High). Unverified-heuristic; \
              calibrate from graduation cohort corpus when available."""
refs      = ["D04/pump_dump_karbalaii_2025"]

[graduation_recency.tier2_under_24h]
value     = 1.30
rationale = """Hours 1–24 post-graduation: first-day accumulation risk. \
              Karbalaii 2025: accumulation phase extends up to 24h in many events. \
              1.30x at base 0.60 → 0.78 (High threshold). Intentionally lower than tier1 \
              (peak risk in the first hour). Unverified-heuristic; calibrate from corpus."""
refs      = ["D04/pump_dump_karbalaii_2025"]

[graduation_recency.tier3_under_72h]
value     = 1.15
rationale = """Hours 24–72 post-graduation: elevated risk for first 3 days. \
              Pattern observed in Chainalysis 2025: 94% of rugged tokens depleted liquidity \
              within 1–3 days. 1.15x is a modest amplifier reflecting reduced but non-zero risk. \
              Unverified-heuristic; calibrate from corpus."""
refs      = ["D04/pump_dump_karbalaii_2025", "D02/rug_pull_lp_drain_chainalysis_2025"]

[graduation_recency.tier4_under_1w]
value     = 1.05
rationale = """Hours 72–168 (first week) post-graduation: residual early-life risk. \
              Below 1.10 to minimise false positives on tokens that graduate and grow. \
              1.05x provides a soft signal without overwhelming base confidence. \
              Unverified-heuristic; to be removed if corpus calibration shows no signal."""
refs      = ["D04/pump_dump_karbalaii_2025"]

# ---------------------------------------------------------------------------
# D14 — Bridge Drain Detector (Sprint 26)
# Primary source: rekt.news leaderboard https://rekt.news/leaderboard
#   Top 6 bridge exploits: Ronin ($625M), Poly Network ($611M), BNB Bridge ($586M),
#   Wormhole ($320M), Nomad ($190M), Multichain ($126M).
# Signal: balance-decrease anomaly on known bridge custody contracts (>20% within window).
# Confidence: Tier1 base 0.85; Tier2 base 0.65; +0.10 if drain ≥50%; cap 0.95.
# Suppression: NOT suppressed — bridges are high-stakes infra.
# ---------------------------------------------------------------------------

[bridge_drain_v1.min_drain_pct]
value     = 0.20
rationale = """Minimum drain fraction to fire. 20% of custody balance draining in a single
              evaluation window has no legitimate explanation for bridge infrastructure.
              Normal bridge operations: proportional inflows + outflows in small fractions.
              Conservative threshold: provides early-warning on partial drains before bridge
              is paused. All 6 rekt.news leaderboard incidents exceeded 50%+ drain.
              Source: rekt.news leaderboard 2026-04-24."""
refs      = ["D14/bridge_drain_v1"]

[bridge_drain_v1.tier1_base_confidence]
value     = 0.85
rationale = """Base confidence for Tier1 bridges (>$100M TVL / confirmed major exploit).
              0.85 is near-certain High/Critical — Tier1 bridges have multiple security layers;
              a 20%+ drain indicates either a major exploit or intentional insider action.
              severity_from_confidence(0.85) = Critical. Consistent with D12 major-drain posture.
              Source: Ronin ($625M, near-100%), Wormhole ($320M, near-100%), Nomad ($190M, near-100%)."""
refs      = ["D14/bridge_drain_v1"]

[bridge_drain_v1.tier2_base_confidence]
value     = 0.65
rationale = """Base confidence for Tier2 bridges (smaller, less well-documented).
              0.65 acknowledges that Tier2 drains may have operational explanations
              (protocol upgrade, rebalancing by operators). Above 0.60 High-band floor.
              severity_from_confidence(0.65) = High.
              Source: Multichain ($126M, admin-key-misuse — ambiguous exploit vs shutdown)."""
refs      = ["D14/bridge_drain_v1"]

[bridge_drain_v1.large_drain_amplifier]
value     = 0.10
rationale = """Additional confidence when drain >= 50%. A 50%+ drain in one window is
              operationally impossible through normal bridge usage. All 6 rekt.news incidents
              exceeded 50% drain within the exploit window.
              +0.10 moves Tier2 from 0.65 to 0.75 (still High) and Tier1 from 0.85 to
              0.95 (Critical cap). Source: rekt.news leaderboard incident pattern."""
refs      = ["D14/bridge_drain_v1"]

[bridge_drain_v1.confidence_cap]
value     = 0.95
rationale = """Maximum confidence cap. Preserves 5% epistemic uncertainty — the registry
              may be stale, addresses may have been legitimately migrated, or a token may
              have unusual mechanics. Never assert 100% confidence from static address lookup.
              Consistent with D12 cap (0.95). Source: CLAUDE.md §Detector Rules."""
refs      = ["D14/bridge_drain_v1"]

[bridge_drain_v1.max_rows_per_address]
value     = 10000
rationale = """Maximum transfer rows fetched per bridge address per evaluation window.
              Bounds DB query cost. At row cap, drain_pct may be underestimated (conservative:
              reduces false positives, not false negatives). 10,000 rows covers even high-volume
              bridges (bridges typically process hundreds of transfers per hour, not thousands).
              Analogous to D05 Signal B max_transfers_per_window."""
refs      = ["D14/bridge_drain_v1"]

[bridge_drain_v1.bridge_registry_path]
value     = "config/known_bridges.toml"
rationale = """Path to the bridge registry TOML file. Loaded once at startup via
              init::known_bridges::load_known_bridges. Falls back to empty registry if absent."""
refs      = ["D14/bridge_drain_v1"]

# ---------------------------------------------------------------------------
# verdict_cache TTL — Sprint 26 (ADR 0007 §9.5)
# ---------------------------------------------------------------------------
# Per-detector cache TTL in minutes. Indexer computes `expires_at = now() + TTL`
# at upsert. Hourly background task purges expired rows.
#
# Three TTL classes per ADR 0007 §9.5:
#   - Fast-moving signals (5 min): D04 pump_dump, D05 wash_trading,
#                                  D11 synchronized_activity, D13 sandwich_mev
#   - Honeypot (15 min):           D01
#   - Slow-moving signals (60 min): everything else
#
# Keys are config-side detector ids; the indexer maps them to runtime
# `Detector::id()` constants at lookup time (see crates/detectors/src/{d01..d14}.rs
# `DETECTOR_ID` constants).

[verdict_cache.ttl_minutes]
d01_honeypot_v1          = 15
d02_rug_pull_v1          = 60
d03_concentration_v1     = 60
d04_pump_dump_v1         = 5
d05_wash_trading_v1      = 5
d06_mint_burn_v1         = 60
d07_withdraw_withheld_v1 = 60
d08_sybil_v1             = 60
d09_bocpd_deployer_v1    = 60
d10_launch_audit_v1      = 60
d11_synchronized_v1      = 5
d12_permit2_drainer_v1   = 60
d13_sandwich_mev_v1      = 5
d14_bridge_drain_v1      = 60
