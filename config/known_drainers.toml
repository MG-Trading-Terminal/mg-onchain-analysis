# known_drainers.toml — Known Permit2 Drainer Address Seed List
#
# Sprint 18 initial seed + Sprint 23 multi-chain extension + Sprint 25 audit.
# Used by D12 Signal A1 (known-drainer cluster label match).
# Loaded at startup via OnceLock<KnownDrainerSet> in d12_permit2_drainer.rs.
#
# Per ADR 0003: NO runtime Scam Sniffer API / Chainalysis API calls.
# This file is the static seed; automated refresh is Sprint 19 scope
# (scamsniffer/scam-database GitHub, permissive licence).
#
# Address format: 0x-prefixed lowercase hex (42 chars).
# All addresses normalized at load time; lookup is O(1) HashSet contains.
#
# IMPORTANT: These are SEED addresses from public disclosures. They may be
# incomplete or include re-used infrastructure wallets. Treat as strong signal
# but not ground truth. See design 0019 §5.1 for confidence adjustment rationale.
#
# EOA cross-chain semantic (Sprint 25 B.2 decision):
# ====================================================
# Drainer clusters (Inferno, Pink, Angel) are operated by EOA wallets. An EOA is
# a private key; the SAME private key controls address 0xABC on Ethereum, 0xABC on
# BSC, and 0xABC on Polygon. There is NO separate address per chain — the address
# IS the public key, chain-agnostic.
#
# Therefore: the `addresses` list is a FLAT list valid across ALL chains in the
# `chains` field. We do NOT need separate per-chain address lists. The existing
# Ethereum-discovered addresses are also the BSC/Polygon addresses for the same
# drainer operator infrastructure.
#
# The `chains = [...]` field tags WHICH chains this drainer is OBSERVED ON (i.e.,
# where it has documented activity), NOT different addresses per chain.
#
# Sprint 25 WebFetch research results:
#   - scamsniffer/scam-database (GitHub): flat unlabeled address list, no per-drainer
#     or per-chain metadata. Addresses cannot be mapped to specific drainer clusters
#     without independent cross-referencing. SPEC-NOTE retained.
#   - ScamSniffer post (2023-12-23): 404 — URL no longer available.
#   - Blockaid blog (2024-02-05): 404 — URL no longer available.
#   - ZachXBT investigations GitHub: repository not found / private.
#   - Dune beetle/pink-drainer: auth-gated dashboard, no public address list.
#
#   Decision: given EOA cross-chain semantic, no NEW addresses are needed for
#   BSC/Polygon — the existing seed addresses are already the correct multi-chain
#   addresses. The `chains` field correctly tags cross-chain activity scope.
#   Sprint 19 automated refresh will expand the address set from scam-database.
#
# `chains` field: EVM chain names where this cluster operates.
# Entries without a `chains` field default to ["ethereum"] (backwards compat).
# Multi-chain drainers that reuse infrastructure across chains have all chains listed.
#
# Verification status:
#   "verified"     — confirmed on-chain via public explorer during Sprint 18
#   "unverified"   — cited in disclosure but not individually confirmed on-chain;
#                    expand and verify in Sprint 19
#
# Expand via Sprint 19 automated refresh:
#   Weekly job fetches https://github.com/scamsniffer/scam-database (ISC-compatible)
#   Diffs against this file → opens PR for review. Zero runtime API dependency.
# =============================================================================

[[drainers]]
name    = "Inferno Drainer"
cluster = "inferno"
status  = "unverified"
# Multi-chain: Inferno Drainer operated across Ethereum, BSC, and Polygon.
# Scam Sniffer 2023 report documents cross-chain activity.
#
# EOA cross-chain semantic (Sprint 25): the existing seed address
# (0x3c116dedca98c1813eadb17b71e869c0faba0f5e) is the correct address for
# BSC and Polygon as well — same private key, same address on all EVM chains.
# The `chains = [...]` field tags the observed activity scope, not separate addresses.
#
# SPEC-NOTE: Sprint 19 automated refresh will replace this single seed with the
# full Inferno cluster address set from scam-database + chain-explorer verification.
chains  = ["ethereum", "bsc", "polygon"]
notes   = """
Multi-chain drainer-as-a-service. Primary EVM cluster. Operated 2023–2024.
Estimated $87M+ stolen across 100,000+ victims (SlowMist Monthly Reports 2023;
Scam Sniffer Q4 2023). Announced shutdown December 2023; relaunched as
Inferno Drainer V2 April 2024 with rotated infrastructure.
Cross-chain activity documented on Ethereum, BSC, and Polygon.
"""
source  = "Scam Sniffer public disclosure 2023-12-23 https://scamsniffer.io/post/inferno-drainer-shutdown/"
addresses = [
    # Treasury/fee wallet cited in Scam Sniffer 2023-12-23 disclosure.
    # SPEC-NOTE: placeholder — verify on-chain in Sprint 19 fixture capture.
    "0x3c116dedca98c1813eadb17b71e869c0faba0f5e",
]

